<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIKEL · Détail du produit</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="animations.css">
    <link rel="stylesheet" href="responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Styles existants... */

        /* ========================================== */
        /* AVIS - NOUVEAUX STYLES                      */
        /* ========================================== */
        .avis-item {
            background: var(--white);
            padding: 20px 24px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            position: relative;
        }

        .avis-item .avis-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .avis-item .avis-actions button {
            padding: 4px 12px;
            border: none;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .avis-item .avis-actions .btn-edit-avis {
            background: #f39c12;
            color: white;
        }

        .avis-item .avis-actions .btn-edit-avis:hover {
            background: #e67e22;
        }

        .avis-item .avis-actions .btn-delete-avis {
            background: #e74c3c;
            color: white;
        }

        .avis-item .avis-actions .btn-delete-avis:hover {
            background: #c0392b;
        }

        .avis-item .avis-badge-user {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 50px;
            font-size: 0.65rem;
            font-weight: 600;
            background: #e8f5e9;
            color: #2e7d32;
            margin-left: 8px;
        }

        .avis-item .avis-pending {
            color: #f39c12;
            font-size: 0.7rem;
            margin: 4px 0 0 0;
        }

        /* Modal d'édition */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: var(--white);
            padding: 32px;
            border-radius: 16px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-content h3 {
            font-family: 'Playfair Display', serif;
            margin-bottom: 20px;
        }

        .modal-content .form-group {
            margin-bottom: 15px;
        }

        .modal-content .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            color: var(--dark-gray);
        }

        .modal-content .form-group input,
        .modal-content .form-group textarea,
        .modal-content .form-group select {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid var(--light-gray);
            border-radius: 8px;
            font-size: 0.95rem;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        .modal-content .form-group input:focus,
        .modal-content .form-group textarea:focus,
        .modal-content .form-group select:focus {
            outline: none;
            border-color: var(--gold);
        }

        .modal-content .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .modal-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .modal-actions .btn-save {
            background: linear-gradient(135deg, var(--gold), var(--accent-dark));
            color: white;
        }

        .modal-actions .btn-save:hover {
            transform: scale(1.02);
        }

        .modal-actions .btn-cancel {
            background: var(--light-gray);
            color: var(--gray);
        }

        .modal-actions .btn-cancel:hover {
            background: #d4d4d4;
        }

        .avis-notification {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            display: none;
        }

        .avis-notification.show {
            display: block;
        }

        .avis-notification.info {
            background: #d1ecf1;
            border: 1px solid #bee5eb;
            color: #0c5460;
        }

        .avis-notification.warning {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            color: #856404;
        }
    </style>
</head>
<body>
    <!-- ... HEADER, HEADER-ACTIONS etc ... -->

    <section class="section product-detail">
        <div class="container">
            <!-- ===== PRODUIT ===== -->
            <div id="productDetail">
                <!-- Contenu chargé par JavaScript -->
            </div>

            <!-- ===== AVIS CLIENTS ===== -->
            <div class="avis-section" id="avisSection">
                <div class="avis-header">
                    <h3>💬 Avis clients</h3>
                    <div class="avis-stats" id="avisStats">
                        <span class="big-star">★</span>
                        <span id="avisMoyenne">0.0</span>
                        <span>(<span id="avisTotal">0</span> avis)</span>
                    </div>
                </div>

                <!-- Notification -->
                <div class="avis-notification" id="avisNotification">
                    <i class="fas fa-info-circle"></i>
                    <span id="avisNotificationText"></span>
                </div>

                <div class="avis-container" id="avisContainer">
                    <div style="text-align:center;padding:30px;color:#888;">
                        <i class="fas fa-spinner fa-spin"></i> Chargement des avis...
                    </div>
                </div>

                <!-- ===== BOUTON + FORMULAIRE AVIS ===== -->
                <div id="avisFormSection">
                    <div class="avis-actions">
                        <button class="avis-toggle-btn" id="avisToggleBtn">
                            <i class="fas fa-pen"></i> Donnez votre avis
                        </button>
                    </div>

                    <div class="avis-form-wrapper" id="avisFormWrapper">
                        <div class="avis-form">
                            <h4 id="avisFormTitle">✍️ Donnez votre avis</h4>
                            <input type="hidden" id="editAvisId" value="">
                            <form id="avisFormSubmit">
                                <div class="form-group">
                                    <label>Votre nom</label>
                                    <input type="text" id="avisNom" placeholder="Votre nom" required>
                                </div>
                                <div class="form-group">
                                    <label>Note</label>
                                    <select id="avisNote" required>
                                        <option value="5">⭐⭐⭐⭐⭐ - Excellent</option>
                                        <option value="4">⭐⭐⭐⭐ - Très bien</option>
                                        <option value="3">⭐⭐⭐ - Bien</option>
                                        <option value="2">⭐⭐ - Moyen</option>
                                        <option value="1">⭐ - Mauvais</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label>Votre commentaire</label>
                                    <textarea id="avisCommentaire" placeholder="Partagez votre expérience..." required></textarea>
                                </div>
                                <button type="submit" class="btn-submit-avis" id="submitAvisBtn">
                                    <i class="fas fa-pen"></i> Publier mon avis
                                </button>
                            </form>
                            <div class="avis-success" id="avisSuccess">
                                <i class="fas fa-check-circle" style="font-size:2rem;"></i>
                                <p style="margin:8px 0 0 0;font-weight:600;">Merci pour votre avis !</p>
                                <p style="margin:0;font-size:0.9rem;color:#2e7d32;">Il sera publié après validation.</p>
                            </div>
                            <button class="avis-close-btn" id="avisCloseBtn">
                                <i class="fas fa-times"></i> Fermer
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- ===== MODAL D'ÉDITION ===== -->
    <div class="modal-overlay" id="editModal">
        <div class="modal-content">
            <h3>✏️ Modifier mon avis</h3>
            <div class="form-group">
                <label>Note</label>
                <select id="editAvisNote" required>
                    <option value="5">⭐⭐⭐⭐⭐ - Excellent</option>
                    <option value="4">⭐⭐⭐⭐ - Très bien</option>
                    <option value="3">⭐⭐⭐ - Bien</option>
                    <option value="2">⭐⭐ - Moyen</option>
                    <option value="1">⭐ - Mauvais</option>
                </select>
            </div>
            <div class="form-group">
                <label>Commentaire</label>
                <textarea id="editAvisCommentaire" placeholder="Modifiez votre commentaire..." required></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeEditModal()">Annuler</button>
                <button class="btn-save" id="saveEditAvisBtn">Enregistrer</button>
            </div>
        </div>
    </div>

    <!-- ... FOOTER ... -->

    <script>
        // ... CONFIGURATION SUPABASE ...

        // ==========================================
        // VARIABLES
        // ==========================================
        let currentUserEmail = null; // À définir avec l'email du client connecté
        let currentUserId = null; // À définir avec l'ID du client connecté
        let editingAvisId = null;

        // ==========================================
        // AVIS - CHARGEMENT AVEC GESTION UTILISATEUR
        // ==========================================
        async function loadAvis(produitId) {
            const container = document.getElementById('avisContainer');
            if (!container) return;

            try {
                const { data: avis, error } = await supabaseClient
                    .from('avis')
                    .select('*')
                    .eq('produit_id', produitId)
                    .eq('est_approuve', true)
                    .order('created_at', { ascending: false });

                if (error) {
                    console.error('❌ Erreur avis:', error);
                    container.innerHTML = `<p style="text-align:center;color:#888;padding:20px;">Erreur de chargement des avis</p>`;
                    return;
                }

                const total = avis ? avis.length : 0;
                let moyenne = 0;
                if (total > 0) {
                    const sum = avis.reduce((acc, a) => acc + a.note, 0);
                    moyenne = (sum / total).toFixed(1);
                }

                document.getElementById('avisMoyenne').textContent = moyenne;
                document.getElementById('avisTotal').textContent = total;

                // 🔥 Vérifier si l'utilisateur a déjà un avis
                const userHasAvis = avis ? avis.some(a => 
                    (currentUserId && a.client_id === currentUserId) ||
                    (currentUserEmail && a.client_email === currentUserEmail)
                ) : false;

                // Afficher la notification
                const notification = document.getElementById('avisNotification');
                const notificationText = document.getElementById('avisNotificationText');

                if (userHasAvis) {
                    notification.className = 'avis-notification show info';
                    notificationText.innerHTML = '📝 Vous avez déjà laissé un avis pour ce produit. Vous pouvez le modifier ou le supprimer.';
                } else {
                    notification.className = 'avis-notification';
                }

                if (!avis || avis.length === 0) {
                    container.innerHTML = `
                        <div class="avis-empty">
                            <p>Aucun avis pour ce produit</p>
                            <p class="sub">Soyez le premier à donner votre avis !</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = avis.map(a => {
                    const isUserAvis = (currentUserId && a.client_id === currentUserId) ||
                                      (currentUserEmail && a.client_email === currentUserEmail);

                    return `
                        <div class="avis-item" data-id="${a.id}">
                            <p class="avis-quote">"${a.commentaire || ''}"</p>
                            <p class="avis-nom">
                                ${a.client_nom}
                                ${isUserAvis ? '<span class="avis-badge-user">Votre avis</span>' : ''}
                            </p>
                            <p class="avis-date">${new Date(a.created_at).toLocaleDateString('fr-FR')}</p>
                            <div class="avis-stars-display">${'★'.repeat(a.note)}${'☆'.repeat(5 - a.note)}</div>
                            ${isUserAvis ? `
                                <div class="avis-actions">
                                    <button class="btn-edit-avis" onclick="openEditModal('${a.id}')">
                                        <i class="fas fa-edit"></i> Modifier
                                    </button>
                                    <button class="btn-delete-avis" onclick="deleteAvis('${a.id}')">
                                        <i class="fas fa-trash"></i> Supprimer
                                    </button>
                                </div>
                            ` : ''}
                        </div>
                    `;
                }).join('');

            } catch (e) {
                console.error('❌ Erreur:', e);
                container.innerHTML = `<p style="text-align:center;color:#888;padding:20px;">Erreur de chargement des avis</p>`;
            }
        }

        // ==========================================
        // OUVRIR MODAL D'ÉDITION
        // ==========================================
        async function openEditModal(avisId) {
            try {
                const { data: avis, error } = await supabaseClient
                    .from('avis')
                    .select('*')
                    .eq('id', avisId)
                    .single();

                if (error) {
                    showNotification('❌ Erreur chargement de l\'avis', 'error');
                    return;
                }

                editingAvisId = avisId;
                document.getElementById('editAvisNote').value = avis.note;
                document.getElementById('editAvisCommentaire').value = avis.commentaire || '';
                document.getElementById('editModal').classList.add('active');

            } catch (e) {
                console.error('❌ Erreur:', e);
                showNotification('❌ Une erreur est survenue', 'error');
            }
        }

        // ==========================================
        // FERMER MODAL D'ÉDITION
        // ==========================================
        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
            editingAvisId = null;
        }

        // ==========================================
        // SAUVEGARDER L'AVIS MODIFIÉ
        // ==========================================
        document.getElementById('saveEditAvisBtn').addEventListener('click', async function() {
            if (!editingAvisId) return;

            const note = parseInt(document.getElementById('editAvisNote').value);
            const commentaire = document.getElementById('editAvisCommentaire').value.trim();

            if (!commentaire) {
                showNotification('Veuillez écrire un commentaire.', 'error');
                return;
            }

            this.disabled = true;
            this.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Enregistrement...';

            try {
                const { error } = await supabaseClient
                    .from('avis')
                    .update({
                        note: note,
                        commentaire: commentaire,
                        updated_at: new Date().toISOString()
                    })
                    .eq('id', editingAvisId);

                if (error) throw error;

                showNotification('✅ Votre avis a été modifié avec succès !', 'success');
                closeEditModal();
                
                const productId = getProductId();
                await loadAvis(productId);

            } catch (e) {
                console.error('❌ Erreur:', e);
                showNotification('❌ Erreur lors de la modification', 'error');
            } finally {
                this.disabled = false;
                this.innerHTML = 'Enregistrer';
            }
        });

        // ==========================================
        // SUPPRIMER UN AVIS
        // ==========================================
        async function deleteAvis(avisId) {
            if (!confirm('Voulez-vous vraiment supprimer votre avis ?')) return;

            try {
                const { error } = await supabaseClient
                    .from('avis')
                    .delete()
                    .eq('id', avisId);

                if (error) throw error;

                showNotification('🗑️ Votre avis a été supprimé.', 'info');
                
                const productId = getProductId();
                await loadAvis(productId);

            } catch (e) {
                console.error('❌ Erreur:', e);
                showNotification('❌ Erreur lors de la suppression', 'error');
            }
        }

        // ==========================================
        // SOUMETTRE UN AVIS (AVEC VÉRIFICATION)
        // ==========================================
        document.getElementById('avisFormSubmit')?.addEventListener('submit', async function(e) {
            e.preventDefault();

            const produitId = getProductId();
            if (!produitId) {
                showNotification('❌ Produit non trouvé', 'error');
                return;
            }

            const nom = document.getElementById('avisNom').value.trim();
            const note = parseInt(document.getElementById('avisNote').value);
            const commentaire = document.getElementById('avisCommentaire').value.trim();

            if (!nom || !commentaire) {
                showNotification('Veuillez remplir tous les champs.', 'error');
                return;
            }

            // 🔥 Vérifier si l'utilisateur a déjà un avis
            const { data: existingAvis, error: checkError } = await supabaseClient
                .from('avis')
                .select('id')
                .eq('produit_id', produitId)
                .eq('client_email', currentUserEmail || nom)
                .maybeSingle();

            if (existingAvis) {
                showNotification('⚠️ Vous avez déjà laissé un avis pour ce produit. Vous pouvez le modifier.', 'info');
                return;
            }

            const btn = document.getElementById('submitAvisBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Envoi...';

            try {
                const { data, error } = await supabaseClient
                    .from('avis')
                    .insert({
                        produit_id: produitId,
                        client_nom: nom,
                        client_email: currentUserEmail || nom,
                        client_id: currentUserId || null,
                        note: note,
                        commentaire: commentaire,
                        est_approuve: false
                    })
                    .select();

                if (error) throw error;

                document.getElementById('avisFormSubmit').style.display = 'none';
                document.getElementById('avisSuccess').classList.add('show');

                setTimeout(() => {
                    document.getElementById('avisFormWrapper').style.display = 'none';
                    document.getElementById('avisToggleBtn').innerHTML = '<i class="fas fa-pen"></i> Donnez votre avis';
                    document.getElementById('avisFormSubmit').reset();
                    document.getElementById('avisFormSubmit').style.display = 'block';
                    document.getElementById('avisSuccess').classList.remove('show');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-pen"></i> Publier mon avis';
                }, 3000);

                await loadAvis(produitId);
                showNotification('✅ Merci pour votre avis !', 'success');

            } catch (e) {
                console.error('❌ Erreur:', e);
                showNotification('❌ Une erreur est survenue', 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-pen"></i> Publier mon avis';
            }
        });

        // ==========================================
        // FERMER LA MODALE AVEC ÉCHAP
        // ==========================================
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeEditModal();
            }
        });

        // Fermer en cliquant à l'extérieur
        document.getElementById('editModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeEditModal();
            }
        });

        // Exposer les fonctions globalement
        window.openEditModal = openEditModal;
        window.closeEditModal = closeEditModal;
        window.deleteAvis = deleteAvis;
        window.loadAvis = loadAvis;
    </script>
</body>
</html>
