<!-- articles.html - Mes articles -->
<div id="articlesContainer" style="background:#ffffff; border-radius:16px; box-shadow:0 2px 20px rgba(0,0,0,0.08); padding:32px;">

    <!-- ===== TITRE ===== -->
    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; margin-bottom:24px;">
        <div>
            <h2 style="font-family:'Playfair Display',serif; font-size:1.6rem; color:#1a1a1a; margin-bottom:4px;">
                <i class="fas fa-cube" style="color:#c9a84c;"></i> Mes articles
            </h2>
            <p style="color:#888; font-size:0.95rem;">Gérez votre catalogue de produits.</p>
        </div>
        <button onclick="openAddArticleModal()" style="padding:12px 24px; background:linear-gradient(135deg, #c9a84c, #a8892e); color:white; border:none; border-radius:10px; font-size:0.95rem; font-weight:600; cursor:pointer; transition:all 0.3s; display:flex; align-items:center; gap:8px;" onmouseover="this.style.transform='scale(1.02)'" onmouseout="this.style.transform='scale(1)'">
            <i class="fas fa-plus"></i> Ajouter un article
        </button>
    </div>

    <!-- ===== STATISTIQUES RAPIDES ===== -->
    <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:24px;">
        <div style="background:#f8f8f8; padding:16px; border-radius:12px; text-align:center; border-left:4px solid #c9a84c;">
            <p style="font-size:0.8rem; color:#888; margin-bottom:4px;">Total articles</p>
            <p style="font-size:1.8rem; font-weight:700; color:#1a1a1a;" id="totalArticles">0</p>
        </div>
        <div style="background:#f8f8f8; padding:16px; border-radius:12px; text-align:center; border-left:4px solid #27ae60;">
            <p style="font-size:0.8rem; color:#888; margin-bottom:4px;">En stock</p>
            <p style="font-size:1.8rem; font-weight:700; color:#27ae60;" id="totalStock">0</p>
        </div>
        <div style="background:#f8f8f8; padding:16px; border-radius:12px; text-align:center; border-left:4px solid #f39c12;">
            <p style="font-size:0.8rem; color:#888; margin-bottom:4px;">Rupture</p>
            <p style="font-size:1.8rem; font-weight:700; color:#f39c12;" id="totalRupture">0</p>
        </div>
        <div style="background:#f8f8f8; padding:16px; border-radius:12px; text-align:center; border-left:4px solid #e74c3c;">
            <p style="font-size:0.8rem; color:#888; margin-bottom:4px;">En solde</p>
            <p style="font-size:1.8rem; font-weight:700; color:#e74c3c;" id="totalSoldes">0</p>
        </div>
    </div>

    <!-- ===== FILTRES & RECHERCHE ===== -->
    <div style="display:flex; flex-wrap:wrap; gap:12px; margin-bottom:20px; align-items:center; background:#f8f8f8; padding:16px; border-radius:12px;">
        <div style="flex:2; min-width:200px;">
            <input type="text" id="searchInputArticles" placeholder="🔍 Rechercher un produit..." style="width:100%; padding:10px 14px; border:2px solid #e8e8e8; border-radius:10px; font-size:0.95rem; transition:all 0.3s; background:#ffffff;" onfocus="this.style.borderColor='#c9a84c'" onblur="this.style.borderColor='#e8e8e8'" onkeyup="applyArticleFilters()">
        </div>
        <div style="min-width:150px;">
            <select id="filterCategorie" style="width:100%; padding:10px 14px; border:2px solid #e8e8e8; border-radius:10px; font-size:0.95rem; background:#ffffff; cursor:pointer;" onchange="applyArticleFilters()">
                <option value="all">📂 Toutes les catégories</option>
                <option value="vêtements">👕 Vêtements</option>
                <option value="accessoires">👜 Accessoires</option>
                <option value="chaussures">👟 Chaussures</option>
                <option value="sport">🏋️ Sport</option>
                <option value="électronique">📱 Électronique</option>
            </select>
        </div>
        <div style="min-width:150px;">
            <select id="filterStatutArticle" style="width:100%; padding:10px 14px; border:2px solid #e8e8e8; border-radius:10px; font-size:0.95rem; background:#ffffff; cursor:pointer;" onchange="applyArticleFilters()">
                <option value="all">📊 Tous les statuts</option>
                <option value="En stock">✅ En stock</option>
                <option value="Rupture de stock">⚠️ Rupture de stock</option>
                <option value="Sur commande">📦 Sur commande</option>
                <option value="Précommande">⏳ Précommande</option>
                <option value="Épuisé">🚫 Épuisé</option>
                <option value="Bientôt disponible">🔄 Bientôt disponible</option>
                <option value="soldes">🔥 En solde</option>
            </select>
        </div>
        <button onclick="resetArticleFilters()" style="padding:10px 20px; background:transparent; border:2px solid #e8e8e8; border-radius:10px; font-size:0.95rem; font-weight:600; cursor:pointer; transition:all 0.3s; color:#888;" onmouseover="this.style.borderColor='#c9a84c';this.style.color='#c9a84c'" onmouseout="this.style.borderColor='#e8e8e8';this.style.color='#888'">
            <i class="fas fa-undo"></i> Réinitialiser
        </button>
    </div>

    <!-- ===== TABLEAU DES ARTICLES ===== -->
    <div style="overflow-x:auto; border-radius:12px; border:1px solid #f0f0f0;">
        <table style="width:100%; border-collapse:collapse; font-size:0.95rem;">
            <thead>
                <tr style="background:#f8f8f8; border-bottom:2px solid #f0f0f0;">
                    <th style="text-align:left; padding:14px 12px; font-weight:600; color:#1a1a1a;">ID</th>
                    <th style="text-align:left; padding:14px 12px; font-weight:600; color:#1a1a1a;">Image</th>
                    <th style="text-align:left; padding:14px 12px; font-weight:600; color:#1a1a1a;">Nom</th>
                    <th style="text-align:left; padding:14px 12px; font-weight:600; color:#1a1a1a;">Catégorie</th>
                    <th style="text-align:left; padding:14px 12px; font-weight:600; color:#1a1a1a;">Prix</th>
                    <th style="text-align:left; padding:14px 12px; font-weight:600; color:#1a1a1a;">Stock</th>
                    <th style="text-align:left; padding:14px 12px; font-weight:600; color:#1a1a1a;">Statut</th>
                    <th style="text-align:center; padding:14px 12px; font-weight:600; color:#1a1a1a;">Actions</th>
                </tr>
            </thead>
            <tbody id="articlesTableBody">
                <tr>
                    <td colspan="8" style="text-align:center; padding:40px; color:#888;">
                        <i class="fas fa-spinner fa-spin" style="font-size:1.5rem; display:block; margin-bottom:12px;"></i>
                        Chargement des articles...
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- ===== PAGINATION ===== -->
    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:16px; flex-wrap:wrap; gap:12px;">
        <span style="color:#888; font-size:0.9rem;" id="paginationInfo">Affichage de 0 à 0 sur 0 entrées</span>
        <div style="display:flex; gap:8px;">
            <button onclick="previousArticlePage()" id="prevArticlePage" style="padding:8px 16px; border:2px solid #e8e8e8; border-radius:8px; background:transparent; cursor:pointer; transition:all 0.3s; color:#888;" onmouseover="this.style.borderColor='#c9a84c';this.style.color='#c9a84c'" onmouseout="this.style.borderColor='#e8e8e8';this.style.color='#888'">
                <i class="fas fa-chevron-left"></i> Précédent
            </button>
            <span id="articlePageInfo" style="display:flex; align-items:center; padding:0 12px; font-weight:600; color:#1a1a1a;">Page 1</span>
            <button onclick="nextArticlePage()" id="nextArticlePage" style="padding:8px 16px; border:2px solid #e8e8e8; border-radius:8px; background:transparent; cursor:pointer; transition:all 0.3s; color:#888;" onmouseover="this.style.borderColor='#c9a84c';this.style.color='#c9a84c'" onmouseout="this.style.borderColor='#e8e8e8';this.style.color='#888'">
                Suivant <i class="fas fa-chevron-right"></i>
            </button>
        </div>
    </div>
</div>

<!-- ===== MODAL AJOUT / MODIFICATION ARTICLE ===== -->
<div id="articleModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9999; align-items:center; justify-content:center;">
    <div style="background:white; border-radius:16px; padding:32px; max-width:550px; width:90%; max-height:90vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,0.3);">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h3 id="articleModalTitle" style="font-family:'Playfair Display',serif; font-size:1.4rem; margin:0;">
                <i class="fas fa-cube" style="color:#c9a84c;"></i> Ajouter un article
            </h3>
            <button onclick="closeArticleModal()" style="background:transparent; border:none; font-size:1.5rem; cursor:pointer; color:#888;" onmouseover="this.style.color='#e74c3c'" onmouseout="this.style.color='#888'">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <form id="articleForm">
            <input type="hidden" id="articleId" value="">
            
            <!-- Nom -->
            <div class="form-group">
                <label for="articleNom"><i class="fas fa-tag"></i> Nom du produit</label>
                <input type="text" id="articleNom" placeholder="Ex: NIKEL Sport Blanc" required style="width:100%; padding:10px 14px; border:2px solid #e8e8e8; border-radius:10px; font-size:0.95rem; background:#f8f8f8;">
            </div>

            <!-- Catégorie & Prix -->
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                <div class="form-group">
                    <label for="articleCategorie"><i class="fas fa-folder"></i> Catégorie</label>
                    <select id="articleCategorie" style="width:100%; padding:10px 14px; border:2px solid #e8e8e8; border-radius:10px; font-size:0.95rem; background:#f8f8f8;">
                        <option value="vêtements">👕 Vêtements</option>
                        <option value="accessoires">👜 Accessoires</option>
                        <option value="chaussures">👟 Chaussures</option>
                        <option value="sport">🏋️ Sport</option>
                        <option value="électronique">📱 Électronique</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="articlePrix"><i class="fas fa-money-bill-wave"></i> Prix (FCFA)</label>
                    <input type="number" id="articlePrix" placeholder="0" required style="width:100%; padding:10px 14px; border:2px solid #e8e8e8; border-radius:10px; font-size:0.95rem; background:#f8f8f8;">
                </div>
            </div>

            <!-- Stock & Prix original -->
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                <div class="form-group">
                    <label for="articleStock"><i class="fas fa-boxes"></i> Stock</label>
                    <input type="number" id="articleStock" placeholder="0" required style="width:100%; padding:10px 14px; border:2px solid #e8e8e8; border-radius:10px; font-size:0.95rem; background:#f8f8f8;">
                </div>
                <div class="form-group">
                    <label for="articleOldPrice"><i class="fas fa-tag"></i> Ancien prix (optionnel)</label>
                    <input type="number" id="articleOldPrice" placeholder="0" style="width:100%; padding:10px 14px; border:2px solid #e8e8e8; border-radius:10px; font-size:0.95rem; background:#f8f8f8;">
                </div>
            </div>

            <!-- Statut -->
            <div class="form-group">
                <label for="articleStatut"><i class="fas fa-info-circle"></i> Statut</label>
                <select id="articleStatut" style="width:100%; padding:10px 14px; border:2px solid #e8e8e8; border-radius:10px; font-size:0.95rem; background:#f8f8f8; cursor:pointer;">
                    <option value="En stock">✅ En stock</option>
                    <option value="Rupture de stock">⚠️ Rupture de stock</option>
                    <option value="Sur commande">📦 Sur commande</option>
                    <option value="Précommande">⏳ Précommande</option>
                    <option value="Épuisé">🚫 Épuisé</option>
                    <option value="Bientôt disponible">🔄 Bientôt disponible</option>
                </select>
            </div>

            <!-- Description -->
            <div class="form-group">
                <label for="articleDescription"><i class="fas fa-align-left"></i> Description</label>
                <textarea id="articleDescription" rows="3" placeholder="Description du produit..." style="width:100%; padding:10px 14px; border:2px solid #e8e8e8; border-radius:10px; font-size:0.95rem; background:#f8f8f8; resize:vertical; font-family:inherit;"></textarea>
            </div>

            <!-- Image URL -->
            <div class="form-group">
                <label for="articleImage"><i class="fas fa-image"></i> URL de l'image</label>
                <input type="url" id="articleImage" placeholder="https://exemple.com/image.jpg" style="width:100%; padding:10px 14px; border:2px solid #e8e8e8; border-radius:10px; font-size:0.95rem; background:#f8f8f8;">
            </div>

            <!-- Boutons -->
            <div style="display:flex; gap:12px; margin-top:16px;">
                <button type="submit" id="saveArticleBtn" style="flex:1; padding:12px; background:linear-gradient(135deg, #c9a84c, #a8892e); color:white; border:none; border-radius:10px; font-size:1rem; font-weight:600; cursor:pointer; transition:all 0.3s;" onmouseover="this.style.transform='scale(1.02)'" onmouseout="this.style.transform='scale(1)'">
                    <i class="fas fa-save"></i> Enregistrer
                </button>
                <button type="button" onclick="closeArticleModal()" style="flex:1; padding:12px; background:transparent; border:2px solid #e8e8e8; border-radius:10px; font-size:1rem; font-weight:600; cursor:pointer; transition:all 0.3s; color:#888;" onmouseover="this.style.borderColor='#e74c3c';this.style.color='#e74c3c'" onmouseout="this.style.borderColor='#e8e8e8';this.style.color='#888'">
                    <i class="fas fa-times"></i> Annuler
                </button>
            </div>
        </form>
    </div>
</div>

<!-- ===== SCRIPTS ===== -->
<script>
    (function() {
        // ==========================================
        // RÉFÉRENCE SUPABASE
        // ==========================================
        const supabaseClient = window.supabaseClient;

        if (!supabaseClient) {
            console.error('❌ SupabaseClient non disponible !');
            document.getElementById('articlesContainer').innerHTML = `
                <div style="text-align:center; padding:60px; color:red;">
                    <i class="fas fa-exclamation-circle" style="font-size:3rem;"></i>
                    <h3>Erreur de connexion</h3>
                    <p>Impossible de se connecter à la base de données.</p>
                    <p style="font-size:0.9rem; color:#888;">Veuillez rafraîchir la page.</p>
                </div>
            `;
            return;
        }

        console.log('✅ SupabaseClient disponible dans articles.html');

        // ==========================================
        // VARIABLES GLOBALES
        // ==========================================
        let allArticles = [];
        let filteredArticles = [];
        let currentArticlePage = 1;
        const articlesPerPage = 10;

        // ==========================================
        // FORMATER LE PRIX
        // ==========================================
        function formatPrice(price) {
            return price.toFixed(2).replace('.', ',') + ' FCFA';
        }

        // ==========================================
        // DÉTERMINER SI UN ARTICLE EST EN SOLDE
        // ==========================================
        function isOnSale(article) {
            return article.prix_original && parseFloat(article.prix_original) > parseFloat(article.prix);
        }

        // ==========================================
        // AFFICHER LE STATUT AVEC COULEUR
        // ==========================================
        function getArticleStatutBadge(article) {
            // Si l'article est en solde, afficher un badge spécial
            if (isOnSale(article)) {
                return `<span style="background:#e74c3c; color:white; padding:4px 12px; border-radius:50px; font-size:0.75rem; font-weight:600; display:inline-flex; align-items:center; gap:6px;">
                    <i class="fas fa-fire"></i> En solde
                </span>`;
            }

            const statuts = {
                'En stock': { bg: '#27ae60', icon: 'fa-check', text: 'En stock' },
                'Rupture de stock': { bg: '#f39c12', icon: 'fa-times', text: 'Rupture de stock' },
                'Sur commande': { bg: '#3498db', icon: 'fa-clock', text: 'Sur commande' },
                'Précommande': { bg: '#9b59b6', icon: 'fa-hourglass-half', text: 'Précommande' },
                'Épuisé': { bg: '#e74c3c', icon: 'fa-ban', text: 'Épuisé' },
                'Bientôt disponible': { bg: '#1abc9c', icon: 'fa-arrow-right', text: 'Bientôt disponible' }
            };
            const s = statuts[article.statut] || statuts['En stock'];
            return `<span style="background:${s.bg}; color:white; padding:4px 12px; border-radius:50px; font-size:0.75rem; font-weight:600; display:inline-flex; align-items:center; gap:6px;">
                <i class="fas ${s.icon}"></i> ${s.text}
            </span>`;
        }

        // ==========================================
        // RENDU DU TABLEAU
        // ==========================================
        function renderArticleTable() {
            const tbody = document.getElementById('articlesTableBody');
            
            if (filteredArticles.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="8" style="text-align:center; padding:40px; color:#888;">
                            <i class="fas fa-box-open" style="font-size:2rem; display:block; margin-bottom:12px; color:#ddd;"></i>
                            Aucun article trouvé.
                        </td>
                    </tr>
                `;
                return;
            }

            const startIndex = (currentArticlePage - 1) * articlesPerPage;
            const endIndex = Math.min(startIndex + articlesPerPage, filteredArticles.length);
            const pageItems = filteredArticles.slice(startIndex, endIndex);

            tbody.innerHTML = pageItems.map(article => `
                <tr style="border-bottom:1px solid #f0f0f0; transition:background 0.2s;" onmouseover="this.style.background='#fafafa'" onmouseout="this.style.background='transparent'">
                    <td style="padding:12px; font-weight:600; color:#1a1a1a;">#${article.id}</td>
                    <td style="padding:12px;">
                        <img src="${article.image_url || 'https://via.placeholder.com/50x50/1a1a1a/FFFFFF?text=NIKEL'}" 
                             alt="${article.nom}" 
                             style="width:50px; height:50px; object-fit:cover; border-radius:8px;"
                             onerror="this.src='https://via.placeholder.com/50x50/1a1a1a/FFFFFF?text=NIKEL'">
                    </td>
                    <td style="padding:12px; font-weight:500;">${article.nom}</td>
                    <td style="padding:12px; color:#888;">${article.categorie || '—'}</td>
                    <td style="padding:12px; font-weight:700; color:#c9a84c;">
                        ${formatPrice(article.prix)}
                        ${article.prix_original ? `<span style="font-size:0.8rem; color:#999; text-decoration:line-through; display:block;">${formatPrice(article.prix_original)}</span>` : ''}
                    </td>
                    <td style="padding:12px; text-align:center; font-weight:600;">${article.stock || 0}</td>
                    <td style="padding:12px;">${getArticleStatutBadge(article)}</td>
                    <td style="padding:12px; text-align:center;">
                        <button onclick="editArticle('${article.id}')" style="padding:6px 12px; border:none; border-radius:6px; background:#f39c12; color:white; cursor:pointer; font-size:0.8rem; margin:2px;" title="Modifier">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button onclick="deleteArticle('${article.id}')" style="padding:6px 12px; border:none; border-radius:6px; background:#e74c3c; color:white; cursor:pointer; font-size:0.8rem; margin:2px;" title="Supprimer">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        // ==========================================
        // METTRE À JOUR LES STATISTIQUES
        // ==========================================
        function updateArticleStats() {
            const total = allArticles.length;
            
            // En stock : statut "En stock" ou "Bientôt disponible"
            const stock = allArticles.filter(a => 
                a.statut === 'En stock' || a.statut === 'Bientôt disponible'
            ).length;
            
            // Rupture : statut "Rupture de stock" ou "Épuisé"
            const rupture = allArticles.filter(a => 
                a.statut === 'Rupture de stock' || a.statut === 'Épuisé'
            ).length;
            
            // 🔥 En solde : prix_original > prix (automatique !)
            const soldes = allArticles.filter(a => 
                a.prix_original && parseFloat(a.prix_original) > parseFloat(a.prix)
            ).length;

            document.getElementById('totalArticles').textContent = total;
            document.getElementById('totalStock').textContent = stock;
            document.getElementById('totalRupture').textContent = rupture;
            document.getElementById('totalSoldes').textContent = soldes;
        }

        // ==========================================
        // METTRE À JOUR LES INFOS DE PAGINATION
        // ==========================================
        function updateArticlePaginationInfo() {
            const total = filteredArticles.length;
            const start = (currentArticlePage - 1) * articlesPerPage + 1;
            const end = Math.min(currentArticlePage * articlesPerPage, total);
            const totalPages = Math.ceil(total / articlesPerPage);

            document.getElementById('paginationInfo').textContent = 
                `Affichage de ${total > 0 ? start : 0} à ${end} sur ${total} entrées`;
            document.getElementById('articlePageInfo').textContent = `Page ${currentArticlePage} sur ${totalPages || 1}`;

            document.getElementById('prevArticlePage').disabled = currentArticlePage <= 1;
            document.getElementById('nextArticlePage').disabled = currentArticlePage >= totalPages;
        }

        // ==========================================
        // PAGINATION
        // ==========================================
        function previousArticlePage() {
            if (currentArticlePage > 1) {
                currentArticlePage--;
                renderArticleTable();
                updateArticlePaginationInfo();
            }
        }

        function nextArticlePage() {
            const totalPages = Math.ceil(filteredArticles.length / articlesPerPage);
            if (currentArticlePage < totalPages) {
                currentArticlePage++;
                renderArticleTable();
                updateArticlePaginationInfo();
            }
        }

        // ==========================================
        // FILTRES
        // ==========================================
        function applyArticleFilters() {
            const searchTerm = document.getElementById('searchInputArticles').value.toLowerCase().trim();
            const categorie = document.getElementById('filterCategorie').value;
            const statut = document.getElementById('filterStatutArticle').value;

            filteredArticles = allArticles.filter(article => {
                let matchSearch = true;
                if (searchTerm) {
                    matchSearch = article.nom.toLowerCase().includes(searchTerm) ||
                                  (article.description && article.description.toLowerCase().includes(searchTerm));
                }

                let matchCategorie = true;
                if (categorie !== 'all') {
                    matchCategorie = article.categorie === categorie;
                }

                let matchStatut = true;
                if (statut !== 'all') {
                    if (statut === 'soldes') {
                        matchStatut = isOnSale(article);
                    } else {
                        matchStatut = article.statut === statut;
                    }
                }

                return matchSearch && matchCategorie && matchStatut;
            });

            currentArticlePage = 1;
            renderArticleTable();
            updateArticlePaginationInfo();
        }

        function resetArticleFilters() {
            document.getElementById('searchInputArticles').value = '';
            document.getElementById('filterCategorie').value = 'all';
            document.getElementById('filterStatutArticle').value = 'all';
            filteredArticles = [...allArticles];
            currentArticlePage = 1;
            renderArticleTable();
            updateArticlePaginationInfo();
        }

        // ==========================================
        // CHARGER LES ARTICLES DEPUIS SUPABASE
        // ==========================================
        async function loadArticlesData() {
            try {
                console.log('📝 Chargement des articles depuis Supabase...');
                
                const { data, error } = await supabaseClient
                    .from('produits')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) {
                    console.error('❌ Erreur chargement:', error);
                    showNotification('❌ Erreur de chargement des articles', 'error');
                    return;
                }

                if (data && data.length > 0) {
                    console.log(`✅ ${data.length} articles chargés depuis Supabase`);
                    allArticles = data.map(p => ({
                        ...p,
                        statut: p.statut || 'En stock'
                    }));
                } else {
                    console.warn('⚠️ Aucun article trouvé dans Supabase');
                    allArticles = [];
                }

                filteredArticles = [...allArticles];
                renderArticleTable();
                updateArticleStats();
                updateArticlePaginationInfo();

            } catch (err) {
                console.error('❌ Erreur:', err);
                showNotification('❌ Erreur de chargement des articles', 'error');
            }
        }

        // ==========================================
        // MODAL : AJOUTER
        // ==========================================
        function openAddArticleModal() {
            document.getElementById('articleModalTitle').innerHTML = '<i class="fas fa-cube" style="color:#c9a84c;"></i> Ajouter un article';
            document.getElementById('articleId').value = '';
            document.getElementById('articleForm').reset();
            document.getElementById('articleStatut').value = 'En stock';
            document.getElementById('articleModal').style.display = 'flex';
        }

        // ==========================================
        // MODAL : MODIFIER
        // ==========================================
        function editArticle(id) {
            console.log('✏️ Modification de l\'article:', id);
            const article = allArticles.find(a => a.id === id);
            if (!article) {
                showNotification('❌ Article non trouvé', 'error');
                return;
            }

            document.getElementById('articleModalTitle').innerHTML = '<i class="fas fa-edit" style="color:#c9a84c;"></i> Modifier l\'article';
            document.getElementById('articleId').value = article.id;
            document.getElementById('articleNom').value = article.nom || '';
            document.getElementById('articleCategorie').value = article.categorie || 'vêtements';
            document.getElementById('articlePrix').value = article.prix || '';
            document.getElementById('articleOldPrice').value = article.prix_original || '';
            document.getElementById('articleStock').value = article.stock || 0;
            document.getElementById('articleStatut').value = article.statut || 'En stock';
            document.getElementById('articleDescription').value = article.description || '';
            document.getElementById('articleImage').value = article.image_url || '';
            document.getElementById('articleModal').style.display = 'flex';
        }

        // ==========================================
        // MODAL : FERMER
        // ==========================================
        function closeArticleModal() {
            document.getElementById('articleModal').style.display = 'none';
            document.getElementById('articleForm').reset();
        }

        // ==========================================
        // SAUVEGARDER ARTICLE (AJOUT OU MODIFICATION)
        // ==========================================
        async function saveArticle(event) {
            event.preventDefault();

            const id = document.getElementById('articleId').value;
            const prix = parseFloat(document.getElementById('articlePrix').value) || 0;
            const oldPrice = document.getElementById('articleOldPrice').value ? parseFloat(document.getElementById('articleOldPrice').value) : null;
            const stock = parseInt(document.getElementById('articleStock').value) || 0;
            const statut = document.getElementById('articleStatut').value || 'En stock';

            const articleData = {
                nom: document.getElementById('articleNom').value.trim(),
                categorie: document.getElementById('articleCategorie').value,
                prix: prix,
                prix_original: oldPrice,
                stock: stock,
                statut: statut,
                description: document.getElementById('articleDescription').value.trim(),
                image_url: document.getElementById('articleImage').value.trim()
            };

            try {
                if (id) {
                    // MODIFICATION
                    console.log('📝 Mise à jour de l\'article:', id);
                    const { error } = await supabaseClient
                        .from('produits')
                        .update(articleData)
                        .eq('id', id);

                    if (error) {
                        console.error('❌ Erreur mise à jour:', error);
                        showNotification('❌ Erreur lors de la modification', 'error');
                        return;
                    }

                    showNotification('✅ Article modifié avec succès !', 'success');
                } else {
                    // AJOUT
                    console.log('📝 Ajout d\'un nouvel article');
                    const { data, error } = await supabaseClient
                        .from('produits')
                        .insert([articleData])
                        .select();

                    if (error) {
                        console.error('❌ Erreur insertion:', error);
                        showNotification('❌ Erreur lors de l\'ajout', 'error');
                        return;
                    }

                    if (data && data.length > 0) {
                        allArticles.unshift(data[0]);
                    }
                    showNotification('✅ Article ajouté avec succès !', 'success');
                }

                closeArticleModal();
                filteredArticles = [...allArticles];
                renderArticleTable();
                updateArticleStats();
                updateArticlePaginationInfo();

            } catch (err) {
                console.error('❌ Erreur:', err);
                showNotification('❌ Une erreur est survenue', 'error');
            }
        }

        // ==========================================
        // SUPPRIMER ARTICLE
        // ==========================================
        async function deleteArticle(id) {
            if (!confirm('Voulez-vous vraiment supprimer cet article ?')) return;

            try {
                console.log('🗑️ Suppression de l\'article:', id);
                const { error } = await supabaseClient
                    .from('produits')
                    .delete()
                    .eq('id', id);

                if (error) {
                    console.error('❌ Erreur suppression:', error);
                    showNotification('❌ Erreur lors de la suppression', 'error');
                    return;
                }

                allArticles = allArticles.filter(a => a.id !== id);
                filteredArticles = [...allArticles];
                renderArticleTable();
                updateArticleStats();
                updateArticlePaginationInfo();
                showNotification('🗑️ Article supprimé avec succès', 'success');

            } catch (err) {
                console.error('❌ Erreur:', err);
                showNotification('❌ Une erreur est survenue', 'error');
            }
        }

        // ==========================================
        // NOTIFICATION
        // ==========================================
        function showNotification(message, type = 'info') {
            document.querySelectorAll('.toast-nikel').forEach(t => t.remove());
            
            const colors = {
                success: '#27ae60',
                error: '#e74c3c',
                info: '#c9a84c'
            };

            const toast = document.createElement('div');
            toast.className = 'toast-nikel';
            toast.style.cssText = `
                position: fixed;
                bottom: 30px;
                right: 30px;
                background: #1a1a1a;
                color: white;
                padding: 16px 24px;
                border-radius: 14px;
                font-weight: 500;
                box-shadow: 0 8px 40px rgba(0,0,0,0.25);
                z-index: 9999;
                max-width: 400px;
                font-size: 0.95rem;
                display: flex;
                align-items: center;
                gap: 12px;
                animation: slideUp 0.5s ease;
                border-left: 4px solid ${colors[type] || colors.info};
            `;
            toast.innerHTML = `<span>${message}</span>`;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(20px)';
                toast.style.transition = 'all 0.4s ease';
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        // ==========================================
        // INITIALISATION
        // ==========================================
        function init() {
            console.log('🚀 Chargement de articles.html...');
            loadArticlesData();

            document.getElementById('articleForm').addEventListener('submit', saveArticle);

            document.getElementById('articleModal').addEventListener('click', function(e) {
                if (e.target === this) closeArticleModal();
            });
        }

        // ==========================================
        // EXPOSER LES FONCTIONS GLOBALEMENT
        // ==========================================
        window.applyArticleFilters = applyArticleFilters;
        window.resetArticleFilters = resetArticleFilters;
        window.previousArticlePage = previousArticlePage;
        window.nextArticlePage = nextArticlePage;
        window.openAddArticleModal = openAddArticleModal;
        window.editArticle = editArticle;
        window.deleteArticle = deleteArticle;
        window.closeArticleModal = closeArticleModal;
        window.saveArticle = saveArticle;
        window.showNotification = showNotification;

        // ==========================================
        // LANCEMENT
        // ==========================================
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }

    })();
</script>
