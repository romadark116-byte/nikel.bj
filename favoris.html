<!-- favoris.html - Favoris des clients (Admin) -->
<div id="favorisContainer" style="background:#ffffff; border-radius:16px; box-shadow:0 2px 20px rgba(0,0,0,0.08); padding:32px;">

    <!-- ===== TITRE ===== -->
    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; margin-bottom:24px;">
        <div>
            <h2 style="font-family:'Playfair Display',serif; font-size:1.6rem; color:#1a1a1a; margin-bottom:4px;">
                <i class="fas fa-heart" style="color:#c9a84c;"></i> Favoris des clients
            </h2>
            <p style="color:#888; font-size:0.95rem;">Découvrez les produits les plus appréciés par vos clients.</p>
        </div>
        <button onclick="rafraichirFavoris()" style="padding:10px 20px; background:linear-gradient(135deg, #c9a84c, #a8892e); color:white; border:none; border-radius:10px; font-size:0.9rem; font-weight:600; cursor:pointer; transition:all 0.3s; display:flex; align-items:center; gap:8px;" onmouseover="this.style.transform='scale(1.02)'" onmouseout="this.style.transform='scale(1)'">
            <i class="fas fa-sync-alt"></i> Rafraîchir
        </button>
    </div>

    <!-- ===== STATISTIQUES ===== -->
    <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:24px;">
        <div style="background:#f8f8f8; padding:16px; border-radius:12px; text-align:center; border-left:4px solid #c9a84c;">
            <p style="font-size:0.8rem; color:#888; margin-bottom:4px;">Total favoris</p>
            <p style="font-size:1.8rem; font-weight:700; color:#1a1a1a;" id="totalFavoris">0</p>
        </div>
        <div style="background:#f8f8f8; padding:16px; border-radius:12px; text-align:center; border-left:4px solid #27ae60;">
            <p style="font-size:0.8rem; color:#888; margin-bottom:4px;">Produits favoris</p>
            <p style="font-size:1.8rem; font-weight:700; color:#27ae60;" id="totalProduits">0</p>
        </div>
        <div style="background:#f8f8f8; padding:16px; border-radius:12px; text-align:center; border-left:4px solid #f39c12;">
            <p style="font-size:0.8rem; color:#888; margin-bottom:4px;">Clients actifs</p>
            <p style="font-size:1.8rem; font-weight:700; color:#f39c12;" id="totalClients">0</p>
        </div>
        <div style="background:#f8f8f8; padding:16px; border-radius:12px; text-align:center; border-left:4px solid #e74c3c;">
            <p style="font-size:0.8rem; color:#888; margin-bottom:4px;">Top produit</p>
            <p style="font-size:1.2rem; font-weight:700; color:#e74c3c; font-size:1rem;" id="topProduit">-</p>
        </div>
    </div>

    <!-- ===== BARRE DE RECHERCHE ===== -->
    <div style="display:flex; flex-wrap:wrap; gap:12px; margin-bottom:20px; align-items:center; background:#f8f8f8; padding:16px; border-radius:12px;">
        <div style="flex:2; min-width:200px;">
            <input type="text" id="searchFavoris" placeholder="🔍 Rechercher un produit..." style="width:100%; padding:10px 14px; border:2px solid #e8e8e8; border-radius:10px; font-size:0.95rem; background:#ffffff; outline:none; transition:border-color 0.3s;" onfocus="this.style.borderColor='#c9a84c'" onblur="this.style.borderColor='#e8e8e8'" onkeyup="applyFavorisFilters()">
        </div>
        <div style="min-width:150px;">
            <select id="filterFavorisCategorie" style="width:100%; padding:10px 14px; border:2px solid #e8e8e8; border-radius:10px; font-size:0.95rem; background:#ffffff; cursor:pointer; outline:none; transition:border-color 0.3s;" onfocus="this.style.borderColor='#c9a84c'" onblur="this.style.borderColor='#e8e8e8'" onchange="applyFavorisFilters()">
                <option value="all">📂 Toutes les catégories</option>
                <option value="vêtements">👕 Vêtements</option>
                <option value="accessoires">👜 Accessoires</option>
                <option value="chaussures">👟 Chaussures</option>
                <option value="sport">🏋️ Sport</option>
                <option value="électronique">📱 Électronique</option>
                <option value="luxe">💎 Luxe</option>
            </select>
        </div>
        <div style="min-width:150px;">
            <select id="filterStock" style="width:100%; padding:10px 14px; border:2px solid #e8e8e8; border-radius:10px; font-size:0.95rem; background:#ffffff; cursor:pointer; outline:none; transition:border-color 0.3s;" onfocus="this.style.borderColor='#c9a84c'" onblur="this.style.borderColor='#e8e8e8'" onchange="applyFavorisFilters()">
                <option value="all">📦 Tous les stocks</option>
                <option value="stock">✅ En stock</option>
                <option value="limited">⚠️ Stock limité</option>
                <option value="rupture">❌ Rupture</option>
            </select>
        </div>
        <button onclick="resetFavorisFilters()" style="padding:10px 20px; background:transparent; border:2px solid #e8e8e8; border-radius:10px; font-size:0.95rem; font-weight:600; cursor:pointer; transition:all 0.3s; color:#888;" onmouseover="this.style.borderColor='#c9a84c';this.style.color='#c9a84c'" onmouseout="this.style.borderColor='#e8e8e8';this.style.color='#888'">
            <i class="fas fa-undo"></i> Réinitialiser
        </button>
    </div>

    <!-- ===== GRILLE FAVORIS ===== -->
    <div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(260px,1fr)); gap:24px;" id="favorisGrid">
        <div style="text-align:center; padding:40px; color:#888; grid-column:1/-1;">
            <i class="fas fa-spinner fa-spin" style="font-size:1.5rem; display:block; margin-bottom:12px;"></i>
            Chargement des favoris...
        </div>
    </div>

    <!-- ===== MESSAGE AUCUN FAVORI ===== -->
    <div id="emptyFavoris" style="display:none; text-align:center; padding:60px 20px; color:#888;">
        <i class="fas fa-heart" style="font-size:3rem; color:#ddd; display:block; margin-bottom:16px;"></i>
        <h3 style="color:#1a1a1a;">Aucun favori</h3>
        <p style="color:#888;">Aucun client n'a encore ajouté de produits à ses favoris.</p>
    </div>

    <!-- ===== PAGINATION ===== -->
    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:20px; flex-wrap:wrap; gap:12px;" id="paginationContainer">
        <span style="color:#888; font-size:0.9rem;" id="favorisPaginationInfo">Affichage de 0 à 0 sur 0</span>
        <div style="display:flex; gap:8px;">
            <button onclick="prevFavorisPage()" id="prevFavorisPage" style="padding:8px 16px; border:2px solid #e8e8e8; border-radius:8px; background:transparent; cursor:pointer; transition:all 0.3s; color:#888;" onmouseover="this.style.borderColor='#c9a84c';this.style.color='#c9a84c'" onmouseout="this.style.borderColor='#e8e8e8';this.style.color='#888'">
                <i class="fas fa-chevron-left"></i> Précédent
            </button>
            <span id="favorisPageInfo" style="display:flex; align-items:center; padding:0 12px; font-weight:600; color:#1a1a1a;">Page 1</span>
            <button onclick="nextFavorisPage()" id="nextFavorisPage" style="padding:8px 16px; border:2px solid #e8e8e8; border-radius:8px; background:transparent; cursor:pointer; transition:all 0.3s; color:#888;" onmouseover="this.style.borderColor='#c9a84c';this.style.color='#c9a84c'" onmouseout="this.style.borderColor='#e8e8e8';this.style.color='#888'">
                Suivant <i class="fas fa-chevron-right"></i>
            </button>
        </div>
    </div>
</div>

<!-- ===== SCRIPTS ===== -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    (function() {
        // ==========================================
        // RÉFÉRENCE SUPABASE
        // ==========================================
        const supabaseClient = window.supabaseClient;

        if (!supabaseClient) {
            console.error('❌ SupabaseClient non disponible !');
            document.getElementById('favorisContainer').innerHTML = `
                <div style="text-align:center; padding:60px; color:red;">
                    <i class="fas fa-exclamation-circle" style="font-size:3rem;"></i>
                    <h3>Erreur de connexion</h3>
                    <p>Impossible de se connecter à la base de données.</p>
                    <p style="font-size:0.9rem; color:#888;">Veuillez rafraîchir la page.</p>
                </div>
            `;
            return;
        }

        console.log('✅ SupabaseClient disponible dans favoris.html');

        // ==========================================
        // VARIABLES GLOBALES
        // ==========================================
        let allFavoris = [];
        let filteredFavoris = [];
        let currentPage = 1;
        const perPage = 6;

        // ==========================================
        // CHARGER LES FAVORIS DEPUIS SUPABASE
        // ==========================================
        async function loadFavorisData() {
            try {
                console.log('📝 Chargement des favoris depuis Supabase...');

                // 1. Récupérer les favoris avec les infos des clients
                const { data: favoris, error: favorisError } = await supabaseClient
                    .from('favoris')
                    .select(`
                        produit_id,
                        clients (
                            prenom,
                            nom
                        )
                    `);

                if (favorisError) {
                    console.error('❌ Erreur chargement favoris:', favorisError);
                    showNotification('❌ Erreur de chargement des favoris', 'error');
                    return;
                }

                console.log('📊 Favoris trouvés:', favoris);

                if (!favoris || favoris.length === 0) {
                    allFavoris = [];
                    filteredFavoris = [];
                    renderFavoris();
                    updateStats();
                    updatePaginationInfo();
                    return;
                }

                // 2. Grouper les favoris par produit
                const productMap = {};
                favoris.forEach(f => {
                    const productId = f.produit_id;
                    if (!productMap[productId]) {
                        productMap[productId] = {
                            clients: []
                        };
                    }
                    if (f.clients) {
                        const nomComplet = `${f.clients.prenom || ''} ${f.clients.nom || ''}`.trim();
                        if (nomComplet) {
                            productMap[productId].clients.push(nomComplet);
                        }
                    }
                });

                // 3. Récupérer les IDs des produits
                const productIds = Object.keys(productMap);
                console.log('🆔 IDs des produits favoris:', productIds);

                if (productIds.length === 0) {
                    allFavoris = [];
                    filteredFavoris = [];
                    renderFavoris();
                    updateStats();
                    updatePaginationInfo();
                    return;
                }

                // 4. Récupérer les détails des produits
                const { data: produits, error: produitsError } = await supabaseClient
                    .from('produits')
                    .select('*')
                    .in('id', productIds);

                if (produitsError) {
                    console.error('❌ Erreur chargement produits:', produitsError);
                    showNotification('❌ Erreur de chargement des produits', 'error');
                    return;
                }

                console.log('📦 Produits récupérés:', produits);

                // 5. Construire les données des favoris
                allFavoris = produits.map(p => {
                    const favorisData = productMap[p.id] || { clients: [] };
                    return {
                        id: p.id,
                        produit: p.nom,
                        categorie: p.categorie || 'non-classé',
                        prix: parseFloat(p.prix) || 0,
                        prix_original: p.prix_original ? parseFloat(p.prix_original) : null,
                        stock: p.stock || 0,
                        image: p.image_url || 'https://via.placeholder.com/260x260/1a1a1a/FFFFFF?text=NIKEL',
                        description: p.description || '',
                        statut: p.statut || 'En stock',
                        nbFavoris: favorisData.clients.length,
                        clients: favorisData.clients
                    };
                });

                // Trier par nombre de favoris (du plus populaire au moins)
                allFavoris.sort((a, b) => b.nbFavoris - a.nbFavoris);

                console.log(`✅ ${allFavoris.length} favoris chargés depuis Supabase`);

                filteredFavoris = [...allFavoris];
                renderFavoris();
                updateStats();
                updatePaginationInfo();

            } catch (err) {
                console.error('❌ Erreur:', err);
                showNotification('❌ Erreur de chargement des favoris', 'error');
            }
        }

        // ==========================================
        // RENDU DES FAVORIS
        // ==========================================
        function renderFavoris() {
            const grid = document.getElementById('favorisGrid');
            const empty = document.getElementById('emptyFavoris');
            const pagination = document.getElementById('paginationContainer');

            if (allFavoris.length === 0) {
                grid.style.display = 'none';
                empty.style.display = 'block';
                pagination.style.display = 'none';
                return;
            }

            grid.style.display = 'grid';
            empty.style.display = 'none';
            pagination.style.display = 'flex';

            if (filteredFavoris.length === 0) {
                grid.innerHTML = `
                    <div style="text-align:center; padding:40px; color:#888; grid-column:1/-1;">
                        <i class="fas fa-search" style="font-size:2rem; display:block; margin-bottom:12px; color:#ddd;"></i>
                        Aucun favori ne correspond à votre recherche.
                    </div>
                `;
                return;
            }

            const start = (currentPage - 1) * perPage;
            const items = filteredFavoris.slice(start, start + perPage);

            grid.innerHTML = items.map(f => {
                // Calcul de la réduction
                const discount = f.prix_original && f.prix_original > f.prix 
                    ? Math.round(((f.prix_original - f.prix) / f.prix_original) * 100) 
                    : null;

                // Déterminer le statut du stock
                let stockBadge = '';
                let stockColor = '';
                if (f.stock === 0) {
                    stockBadge = 'Rupture';
                    stockColor = '#e74c3c';
                } else if (f.stock < 5) {
                    stockBadge = 'Stock limité';
                    stockColor = '#f39c12';
                }

                // Icône de catégorie
                const categoryIcons = {
                    'vêtements': '👕',
                    'accessoires': '👜',
                    'chaussures': '👟',
                    'sport': '🏋️',
                    'électronique': '📱',
                    'luxe': '💎'
                };
                const catIcon = categoryIcons[f.categorie] || '📦';

                return `
                <div style="background:#ffffff; border-radius:12px; overflow:hidden; transition:all 0.3s; position:relative; border:1px solid #f0f0f0; box-shadow:0 2px 8px rgba(0,0,0,0.04);" 
                     onmouseover="this.style.transform='translateY(-4px)';this.style.boxShadow='0 8px 30px rgba(0,0,0,0.12)';this.style.borderColor='#c9a84c'" 
                     onmouseout="this.style.transform='translateY(0)';this.style.boxShadow='0 2px 8px rgba(0,0,0,0.04)';this.style.borderColor='#f0f0f0'">
                    
                    <!-- Badge réduction -->
                    ${discount ? `<span style="position:absolute;top:10px;left:10px;background:#e74c3c;color:white;padding:4px 12px;border-radius:50px;font-size:0.7rem;font-weight:700;z-index:2;box-shadow:0 2px 8px rgba(231,76,60,0.3);">-${discount}%</span>` : ''}
                    
                    <!-- Badge stock -->
                    ${stockBadge ? `<span style="position:absolute;top:10px;right:10px;background:${stockColor};color:white;padding:4px 12px;border-radius:50px;font-size:0.7rem;font-weight:600;z-index:2;box-shadow:0 2px 8px rgba(0,0,0,0.15);">${stockBadge}</span>` : ''}

                    <!-- Image -->
                    <div style="position:relative;overflow:hidden;cursor:pointer;background:#f8f8f8;" onclick="window.location.href='produit.html?id=${f.id}'">
                        <img src="${f.image}" 
                             style="width:100%; height:200px; object-fit:cover; transition:transform 0.5s;"
                             onmouseover="this.style.transform='scale(1.05)'" 
                             onmouseout="this.style.transform='scale(1)'"
                             onerror="this.src='https://via.placeholder.com/260x260/1a1a1a/FFFFFF?text=NIKEL'">
                        ${f.nbFavoris > 0 ? `
                            <div style="position:absolute;bottom:10px;left:10px;background:rgba(0,0,0,0.7);color:white;padding:4px 12px;border-radius:50px;font-size:0.75rem;display:flex;align-items:center;gap:6px;backdrop-filter:blur(4px);">
                                <i class="fas fa-heart" style="color:#e74c3c;"></i>
                                <span>${f.nbFavoris}</span>
                            </div>
                        ` : ''}
                    </div>
                    
                    <div style="padding:16px;">
                        <!-- Catégorie -->
                        <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
                            <span style="font-size:0.85rem;">${catIcon}</span>
                            <span style="color:#888; font-size:0.8rem; text-transform:uppercase; letter-spacing:0.5px;">${f.categorie}</span>
                        </div>
                        
                        <!-- Nom -->
                        <h4 style="font-weight:600; font-size:1rem; margin:0 0 6px 0; cursor:pointer; color:#1a1a1a;" onclick="window.location.href='produit.html?id=${f.id}'">${f.produit}</h4>
                        
                        <!-- Prix -->
                        <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
                            <span style="font-weight:700; color:#c9a84c; font-size:1.1rem;">${f.prix.toLocaleString()} FCFA</span>
                            ${f.prix_original && f.prix_original > f.prix ? 
                                `<span style="text-decoration:line-through; color:#999; font-size:0.8rem;">${f.prix_original.toLocaleString()} FCFA</span>` : ''}
                        </div>

                        <!-- Clients qui ont aimé -->
                        ${f.clients && f.clients.length > 0 ? `
                            <details style="margin-top:8px;">
                                <summary style="cursor:pointer; font-size:0.8rem; color:#888; font-weight:500; padding:4px 0; border-top:1px solid #f0f0f0; padding-top:10px;">
                                    👥 ${f.clients.length} client${f.clients.length > 1 ? 's' : ''} ont aimé
                                </summary>
                                <div style="margin-top:8px; display:flex; flex-wrap:wrap; gap:4px;">
                                    ${f.clients.slice(0, 15).map(c => 
                                        `<span style="background:#f8f8f8; padding:3px 10px; border-radius:50px; font-size:0.75rem; color:#555; border:1px solid #eee;">${c}</span>`
                                    ).join('')}
                                    ${f.clients.length > 15 ? `<span style="font-size:0.75rem; color:#888; padding:3px 10px;">+${f.clients.length - 15} autres</span>` : ''}
                                </div>
                            </details>
                        ` : `
                            <div style="margin-top:8px; padding-top:10px; border-top:1px solid #f0f0f0;">
                                <span style="font-size:0.8rem; color:#999;">Aucun client n'a encore aimé ce produit</span>
                            </div>
                        `}
                    </div>
                </div>
            `}).join('');

            updatePaginationInfo();
        }

        // ==========================================
        // STATISTIQUES
        // ==========================================
        function updateStats() {
            const totalFavoris = allFavoris.reduce((sum, f) => sum + f.nbFavoris, 0);
            document.getElementById('totalFavoris').textContent = totalFavoris;
            document.getElementById('totalProduits').textContent = allFavoris.length;
            
            // Clients uniques
            const allClients = allFavoris.flatMap(f => f.clients);
            const uniqueClients = new Set(allClients);
            document.getElementById('totalClients').textContent = uniqueClients.size;

            // Top produit
            if (allFavoris.length > 0) {
                const top = allFavoris[0];
                document.getElementById('topProduit').textContent = top.nbFavoris > 0 ? `${top.produit} (${top.nbFavoris})` : '-';
            } else {
                document.getElementById('topProduit').textContent = '-';
            }
        }

        // ==========================================
        // PAGINATION
        // ==========================================
        function updatePaginationInfo() {
            const total = filteredFavoris.length;
            const start = (currentPage - 1) * perPage + 1;
            const end = Math.min(currentPage * perPage, total);
            const totalPages = Math.ceil(total / perPage) || 1;

            document.getElementById('favorisPaginationInfo').textContent = 
                `Affichage de ${total > 0 ? start : 0} à ${end} sur ${total} entrées`;
            document.getElementById('favorisPageInfo').textContent = `Page ${currentPage} sur ${totalPages}`;

            document.getElementById('prevFavorisPage').disabled = currentPage <= 1;
            document.getElementById('nextFavorisPage').disabled = currentPage >= totalPages;
        }

        function prevFavorisPage() {
            if (currentPage > 1) {
                currentPage--;
                renderFavoris();
                updatePaginationInfo();
            }
        }

        function nextFavorisPage() {
            const totalPages = Math.ceil(filteredFavoris.length / perPage);
            if (currentPage < totalPages) {
                currentPage++;
                renderFavoris();
                updatePaginationInfo();
            }
        }

        // ==========================================
        // FILTRES
        // ==========================================
        function applyFavorisFilters() {
            const search = document.getElementById('searchFavoris').value.toLowerCase().trim();
            const cat = document.getElementById('filterFavorisCategorie').value;
            const stockFilter = document.getElementById('filterStock').value;

            filteredFavoris = allFavoris.filter(f => {
                let match = true;
                
                // Recherche
                if (search) {
                    match = f.produit.toLowerCase().includes(search) ||
                            (f.description && f.description.toLowerCase().includes(search));
                }
                
                // Catégorie
                if (cat !== 'all') {
                    match = match && f.categorie === cat;
                }
                
                // Stock
                if (stockFilter === 'stock') {
                    match = match && f.stock > 5;
                } else if (stockFilter === 'limited') {
                    match = match && f.stock > 0 && f.stock <= 5;
                } else if (stockFilter === 'rupture') {
                    match = match && f.stock === 0;
                }
                
                return match;
            });

            currentPage = 1;
            renderFavoris();
            updatePaginationInfo();
        }

        function resetFavorisFilters() {
            document.getElementById('searchFavoris').value = '';
            document.getElementById('filterFavorisCategorie').value = 'all';
            document.getElementById('filterStock').value = 'all';
            filteredFavoris = [...allFavoris];
            currentPage = 1;
            renderFavoris();
            updatePaginationInfo();
        }

        // ==========================================
        // RAFRAÎCHIR
        // ==========================================
        function rafraichirFavoris() {
            loadFavorisData();
            showNotification('🔄 Favoris actualisés', 'info');
        }

        // ==========================================
        // NOTIFICATION
        // ==========================================
        function showNotification(message, type = 'info') {
            document.querySelectorAll('.toast-nikel').forEach(t => t.remove());

            const colors = {
                success: '#27ae60',
                error: '#e74c3c',
                info: '#c9a84c'
            };

            const toast = document.createElement('div');
            toast.className = 'toast-nikel';
            toast.style.cssText = `
                position: fixed;
                bottom: 30px;
                right: 30px;
                background: #1a1a1a;
                color: white;
                padding: 16px 24px;
                border-radius: 14px;
                font-weight: 500;
                box-shadow: 0 8px 40px rgba(0,0,0,0.25);
                z-index: 9999;
                max-width: 400px;
                font-size: 0.95rem;
                display: flex;
                align-items: center;
                gap: 12px;
                animation: slideUp 0.5s ease;
                border-left: 4px solid ${colors[type] || colors.info};
            `;
            toast.innerHTML = `<span>${message}</span>`;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(20px)';
                toast.style.transition = 'all 0.4s ease';
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        // ==========================================
        // EXPOSER LES FONCTIONS GLOBALEMENT
        // ==========================================
