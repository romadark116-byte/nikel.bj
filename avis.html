<!-- avis.html - Avis et notes -->
<div id="avisContainer" style="background:#ffffff; border-radius:16px; box-shadow:0 2px 20px rgba(0,0,0,0.08); padding:32px;">

    <!-- ===== TITRE ===== -->
    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; margin-bottom:24px;">
        <div>
            <h2 style="font-family:'Playfair Display',serif; font-size:1.6rem; color:#1a1a1a; margin-bottom:4px;">
                <i class="fas fa-star" style="color:#c9a84c;"></i> Avis et notes
            </h2>
            <p style="color:#888; font-size:0.95rem;">Consultez et gérez les avis de vos clients.</p>
        </div>
        <div style="display:flex; gap:8px; align-items:center;">
            <span style="font-size:1.2rem; font-weight:700; color:#c9a84c;" id="noteMoyenne">0.0</span>
            <span style="color:#f39c12;" id="etoiles">☆☆☆☆☆</span>
            <span style="color:#888; font-size:0.9rem;" id="nbAvis">(0 avis)</span>
        </div>
    </div>

    <!-- ===== STATISTIQUES ===== -->
    <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:24px;">
        <div style="background:#f8f8f8; padding:16px; border-radius:12px; text-align:center; border-left:4px solid #c9a84c;">
            <p style="font-size:0.8rem; color:#888; margin-bottom:4px;">Total avis</p>
            <p style="font-size:1.8rem; font-weight:700; color:#1a1a1a;" id="totalAvis">0</p>
        </div>
        <div style="background:#f8f8f8; padding:16px; border-radius:12px; text-align:center; border-left:4px solid #27ae60;">
            <p style="font-size:0.8rem; color:#888; margin-bottom:4px;">⭐ 5 étoiles</p>
            <p style="font-size:1.8rem; font-weight:700; color:#27ae60;" id="total5">0</p>
        </div>
        <div style="background:#f8f8f8; padding:16px; border-radius:12px; text-align:center; border-left:4px solid #f39c12;">
            <p style="font-size:0.8rem; color:#888; margin-bottom:4px;">📝 Avec commentaire</p>
            <p style="font-size:1.8rem; font-weight:700; color:#f39c12;" id="totalCommentaires">0</p>
        </div>
        <div style="background:#f8f8f8; padding:16px; border-radius:12px; text-align:center; border-left:4px solid #e74c3c;">
            <p style="font-size:0.8rem; color:#888; margin-bottom:4px;">⏳ En attente</p>
            <p style="font-size:1.8rem; font-weight:700; color:#e74c3c;" id="totalEnAttente">0</p>
        </div>
    </div>

    <!-- ===== FILTRES ===== -->
    <div style="display:flex; flex-wrap:wrap; gap:12px; margin-bottom:20px; align-items:center; background:#f8f8f8; padding:16px; border-radius:12px;">
        <div style="flex:2; min-width:200px;">
            <input type="text" id="searchAvis" placeholder="🔍 Rechercher un avis..." style="width:100%; padding:10px 14px; border:2px solid #e8e8e8; border-radius:10px; font-size:0.95rem; background:#ffffff; outline:none; transition:border-color 0.3s;" onfocus="this.style.borderColor='#c9a84c'" onblur="this.style.borderColor='#e8e8e8'" onkeyup="applyAvisFilters()">
        </div>
        <div style="min-width:150px;">
            <select id="filterNote" style="width:100%; padding:10px 14px; border:2px solid #e8e8e8; border-radius:10px; font-size:0.95rem; background:#ffffff; cursor:pointer; outline:none; transition:border-color 0.3s;" onfocus="this.style.borderColor='#c9a84c'" onblur="this.style.borderColor='#e8e8e8'" onchange="applyAvisFilters()">
                <option value="all">⭐ Toutes les notes</option>
                <option value="5">⭐⭐⭐⭐⭐ - 5 étoiles</option>
                <option value="4">⭐⭐⭐⭐ - 4 étoiles</option>
                <option value="3">⭐⭐⭐ - 3 étoiles</option>
                <option value="2">⭐⭐ - 2 étoiles</option>
                <option value="1">⭐ - 1 étoile</option>
            </select>
        </div>
        <div style="min-width:150px;">
            <select id="filterStatut" style="width:100%; padding:10px 14px; border:2px solid #e8e8e8; border-radius:10px; font-size:0.95rem; background:#ffffff; cursor:pointer; outline:none; transition:border-color 0.3s;" onfocus="this.style.borderColor='#c9a84c'" onblur="this.style.borderColor='#e8e8e8'" onchange="applyAvisFilters()">
                <option value="all">📊 Tous les statuts</option>
                <option value="approuve">✅ Approuvés</option>
                <option value="en_attente">⏳ En attente</option>
            </select>
        </div>
        <button onclick="resetAvisFilters()" style="padding:10px 20px; background:transparent; border:2px solid #e8e8e8; border-radius:10px; font-size:0.95rem; font-weight:600; cursor:pointer; transition:all 0.3s; color:#888;" onmouseover="this.style.borderColor='#c9a84c';this.style.color='#c9a84c'" onmouseout="this.style.borderColor='#e8e8e8';this.style.color='#888'">
            <i class="fas fa-undo"></i> Réinitialiser
        </button>
    </div>

    <!-- ===== LISTE AVIS ===== -->
    <div id="avisList">
        <div style="text-align:center; padding:40px; color:#888;">
            <i class="fas fa-spinner fa-spin" style="font-size:1.5rem; display:block; margin-bottom:12px;"></i>
            Chargement des avis...
        </div>
    </div>

    <!-- ===== PAGINATION ===== -->
    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:16px; flex-wrap:wrap; gap:12px;">
        <span style="color:#888; font-size:0.9rem;" id="avisPaginationInfo">Affichage de 0 à 0 sur 0</span>
        <div style="display:flex; gap:8px;">
            <button onclick="prevAvisPage()" id="prevAvisPage" style="padding:8px 16px; border:2px solid #e8e8e8; border-radius:8px; background:transparent; cursor:pointer; transition:all 0.3s; color:#888;" onmouseover="this.style.borderColor='#c9a84c';this.style.color='#c9a84c'" onmouseout="this.style.borderColor='#e8e8e8';this.style.color='#888'">
                <i class="fas fa-chevron-left"></i> Précédent
            </button>
            <span id="avisPageInfo" style="display:flex; align-items:center; padding:0 12px; font-weight:600; color:#1a1a1a;">Page 1</span>
            <button onclick="nextAvisPage()" id="nextAvisPage" style="padding:8px 16px; border:2px solid #e8e8e8; border-radius:8px; background:transparent; cursor:pointer; transition:all 0.3s; color:#888;" onmouseover="this.style.borderColor='#c9a84c';this.style.color='#c9a84c'" onmouseout="this.style.borderColor='#e8e8e8';this.style.color='#888'">
                Suivant <i class="fas fa-chevron-right"></i>
            </button>
        </div>
    </div>
</div>

<!-- ===== SCRIPTS ===== -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    (function() {
        const supabaseClient = window.supabaseClient;

        if (!supabaseClient) {
            console.error('❌ SupabaseClient non disponible !');
            return;
        }

        console.log('✅ SupabaseClient disponible dans avis.html');

        let allAvis = [];
        let filteredAvis = [];
        let currentPage = 1;
        const perPage = 5;

        // ==========================================
        // CHARGER LES AVIS
        // ==========================================
        async function loadAvisData() {
            try {
                console.log('📝 Chargement des avis depuis Supabase...');

                const { data: avis, error } = await supabaseClient
                    .from('avis')
                    .select(`
                        *,
                        produits (
                            nom
                        )
                    `)
                    .order('created_at', { ascending: false });

                if (error) {
                    console.error('❌ Erreur chargement avis:', error);
                    showNotification('❌ Erreur de chargement des avis', 'error');
                    return;
                }

                console.log('📊 Avis trouvés:', avis);

                if (!avis || avis.length === 0) {
                    allAvis = [];
                    filteredAvis = [];
                    renderAvis();
                    updateStats();
                    updatePaginationInfo();
                    return;
                }

                allAvis = avis.map(a => ({
                    id: a.id,
                    client: a.client_nom || 'Client anonyme',
                    produit: a.produits ? a.produits.nom : 'Produit inconnu',
                    produit_id: a.produit_id,
                    note: a.note || 0,
                    commentaire: a.commentaire || '',
                    date: a.created_at ? new Date(a.created_at).toLocaleDateString('fr-FR') : 'Date inconnue',
                    est_approuve: a.est_approuve || false,
                    client_email: a.client_email || '',
                    reponse_admin: a.reponse_admin || '',
                    reponse_date: a.reponse_date || null,
                    reponse_admin_nom: a.reponse_admin_nom || 'NIKEL'
                }));

                console.log(`✅ ${allAvis.length} avis chargés depuis Supabase`);

                filteredAvis = [...allAvis];
                renderAvis();
                updateStats();
                updatePaginationInfo();

            } catch (err) {
                console.error('❌ Erreur:', err);
                showNotification('❌ Erreur de chargement des avis', 'error');
            }
        }

        // ==========================================
        // RENDU DES ÉTOILES
        // ==========================================
        function renderStars(n) {
            return '★'.repeat(n) + '☆'.repeat(5 - n);
        }

        // ==========================================
        // RENDU DES AVIS
        // ==========================================
        function renderAvis() {
            const container = document.getElementById('avisList');

            if (filteredAvis.length === 0) {
                container.innerHTML = `
                    <div style="text-align:center; padding:40px; color:#888; background:#f8f8f8; border-radius:12px;">
                        <i class="fas fa-comment-slash" style="font-size:2rem; display:block; margin-bottom:12px; color:#ddd;"></i>
                        Aucun avis trouvé.
                    </div>
                `;
                return;
            }

            const start = (currentPage - 1) * perPage;
            const items = filteredAvis.slice(start, start + perPage);

            container.innerHTML = items.map(a => {
                const hasReponse = a.reponse_admin && a.reponse_admin.trim() !== '';

                return `
                <div style="background:#ffffff; border-radius:12px; padding:18px; margin-bottom:12px; border-left:4px solid ${a.est_approuve ? '#27ae60' : '#f39c12'}; box-shadow:0 2px 8px rgba(0,0,0,0.04); border:1px solid #f0f0f0;">
                    
                    <div style="display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:8px;">
                        <div style="flex:1;">
                            <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
                                <h4 style="font-weight:600; margin:0;">${a.client}</h4>
                                ${a.est_approuve 
                                    ? `<span style="background:#27ae60; color:white; padding:2px 10px; border-radius:50px; font-size:0.65rem; font-weight:600;">✅ Approuvé</span>`
                                    : `<span style="background:#f39c12; color:white; padding:2px 10px; border-radius:50px; font-size:0.65rem; font-weight:600;">⏳ En attente</span>`
                                }
                            </div>
                            <p style="font-size:0.85rem; color:#888; margin:4px 0 0 0;">
                                <a href="produit.html?id=${a.produit_id}" style="color:#888; text-decoration:none;" onmouseover="this.style.color='#c9a84c'" onmouseout="this.style.color='#888'">
                                    📦 ${a.produit}
                                </a>
                            </p>
                        </div>
                        <div style="text-align:right;">
                            <span style="font-size:1.1rem; color:#f39c12;">${renderStars(a.note)}</span>
                            <p style="font-size:0.8rem; color:#888; margin:2px 0 0 0;">${a.date}</p>
                        </div>
                    </div>

                    ${a.commentaire ? `<p style="margin-top:10px; color:#555; line-height:1.6;">${a.commentaire}</p>` : ''}

                    ${hasReponse ? `
                        <div style="margin-top:12px; padding:12px 16px; background:#f8f5e8; border-radius:8px; border-left:3px solid #c9a84c;">
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <span style="font-weight:600; color:#c9a84c; font-size:0.8rem;">
                                    <i class="fas fa-reply"></i> Réponse de ${a.reponse_admin_nom || 'NIKEL'}
                                </span>
                                <span style="font-size:0.7rem; color:#888;">${a.reponse_date ? new Date(a.reponse_date).toLocaleDateString('fr-FR') : ''}</span>
                            </div>
                            <p style="margin:4px 0 0 0; color:#555; font-size:0.95rem; line-height:1.5;">${a.reponse_admin}</p>
                        </div>
                    ` : ''}

                    <div style="margin-top:12px; display:flex; gap:8px; flex-wrap:wrap; border-top:1px solid #f0f0f0; padding-top:12px;">
                        ${!a.est_approuve ? `
                            <button onclick="approuverAvis('${a.id}')" style="padding:6px 16px; border:none; border-radius:6px; background:#27ae60; color:white; cursor:pointer; font-size:0.8rem; font-weight:600; transition:all 0.3s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                                ✅ Approuver
                            </button>
                        ` : ''}
                        <button onclick="supprimerAvis('${a.id}')" style="padding:6px 16px; border:none; border-radius:6px; background:#e74c3c; color:white; cursor:pointer; font-size:0.8rem; font-weight:600; transition:all 0.3s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                            🗑️ Supprimer
                        </button>
                        <button onclick="ouvrirReponseModal('${a.id}', '${a.client}')" style="padding:6px 16px; border:none; border-radius:6px; background:#c9a84c; color:white; cursor:pointer; font-size:0.8rem; font-weight:600; transition:all 0.3s; display:inline-flex; align-items:center; gap:6px;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                            <i class="fas fa-reply"></i> ${hasReponse ? 'Modifier la réponse' : 'Répondre'}
                        </button>
                    </div>
                </div>
            `}).join('');

            updatePaginationInfo();
        }

        // ==========================================
        // STATISTIQUES
        // ==========================================
        function updateStats() {
            const total = allAvis.length;
            const moy = total > 0 ? (allAvis.reduce((s, a) => s + a.note, 0) / total) : 0;
            const cinq = allAvis.filter(a => a.note === 5).length;
            const avecCommentaire = allAvis.filter(a => a.commentaire && a.commentaire.trim().length > 0).length;
            const enAttente = allAvis.filter(a => !a.est_approuve).length;

            document.getElementById('totalAvis').textContent = total;
            document.getElementById('noteMoyenne').textContent = moy.toFixed(1);
            document.getElementById('total5').textContent = cinq;
            document.getElementById('totalCommentaires').textContent = avecCommentaire;
            document.getElementById('totalEnAttente').textContent = enAttente;
            document.getElementById('nbAvis').textContent = `(${total} avis)`;
            
            const fullStars = Math.round(moy);
            document.getElementById('etoiles').textContent = '★'.repeat(fullStars) + '☆'.repeat(5 - fullStars);
        }

        // ==========================================
        // PAGINATION
        // ==========================================
        function updatePaginationInfo() {
            const total = filteredAvis.length;
            const start = (currentPage - 1) * perPage + 1;
            const end = Math.min(currentPage * perPage, total);
            const totalPages = Math.ceil(total / perPage) || 1;

            document.getElementById('avisPaginationInfo').textContent = 
                `Affichage de ${total > 0 ? start : 0} à ${end} sur ${total} entrées`;
            document.getElementById('avisPageInfo').textContent = `Page ${currentPage} sur ${totalPages}`;

            document.getElementById('prevAvisPage').disabled = currentPage <= 1;
            document.getElementById('nextAvisPage').disabled = currentPage >= totalPages;
        }

        function prevAvisPage() {
            if (currentPage > 1) {
                currentPage--;
                renderAvis();
            }
        }

        function nextAvisPage() {
            const totalPages = Math.ceil(filteredAvis.length / perPage);
            if (currentPage < totalPages) {
                currentPage++;
                renderAvis();
            }
        }

        // ==========================================
        // FILTRES
        // ==========================================
        function applyAvisFilters() {
            const search = document.getElementById('searchAvis').value.toLowerCase().trim();
            const note = document.getElementById('filterNote').value;
            const statut = document.getElementById('filterStatut').value;

            filteredAvis = allAvis.filter(a => {
                let match = true;
                if (search) {
                    match = a.client.toLowerCase().includes(search) ||
                            a.produit.toLowerCase().includes(search) ||
                            (a.commentaire && a.commentaire.toLowerCase().includes(search)) ||
                            (a.reponse_admin && a.reponse_admin.toLowerCase().includes(search));
                }
                if (note !== 'all') {
                    match = match && a.note === parseInt(note);
                }
                if (statut === 'approuve') {
                    match = match && a.est_approuve === true;
                } else if (statut === 'en_attente') {
                    match = match && a.est_approuve === false;
                }
                return match;
            });

            currentPage = 1;
            renderAvis();
            updatePaginationInfo();
        }

        function resetAvisFilters() {
            document.getElementById('searchAvis').value = '';
            document.getElementById('filterNote').value = 'all';
            document.getElementById('filterStatut').value = 'all';
            filteredAvis = [...allAvis];
            currentPage = 1;
            renderAvis();
            updatePaginationInfo();
        }

        // ==========================================
        // APPROUVER UN AVIS
        // ==========================================
        async function approuverAvis(id) {
            try {
                const { error } = await supabaseClient
                    .from('avis')
                    .update({ est_approuve: true })
                    .eq('id', id);

                if (error) throw error;

                const avis = allAvis.find(a => a.id === id);
                if (avis) avis.est_approuve = true;
                
                filteredAvis = [...allAvis];
                renderAvis();
                updateStats();
                showNotification('✅ Avis approuvé avec succès', 'success');

            } catch (err) {
                console.error('❌ Erreur:', err);
                showNotification('❌ Erreur lors de l\'approbation', 'error');
            }
        }

        // ==========================================
        // SUPPRIMER UN AVIS
        // ==========================================
        async function supprimerAvis(id) {
            if (!confirm('Voulez-vous vraiment supprimer cet avis ? Cette action est irréversible.')) return;

            try {
                const { error } = await supabaseClient
                    .from('avis')
                    .delete()
                    .eq('id', id);

                if (error) throw error;

                allAvis = allAvis.filter(a => a.id !== id);
                filteredAvis = [...allAvis];
                renderAvis();
                updateStats();
                updatePaginationInfo();
                showNotification('🗑️ Avis supprimé avec succès', 'info');

            } catch (err) {
                console.error('❌ Erreur:', err);
                showNotification('❌ Erreur lors de la suppression', 'error');
            }
        }

        // ==========================================
        // MODAL DE RÉPONSE
        // ==========================================
        function ouvrirReponseModal(avisId, clientNom) {
            const avis = allAvis.find(a => a.id === avisId);
            const reponseExistante = avis?.reponse_admin || '';

            const modal = document.createElement('div');
            modal.id = 'reponseModal';
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.5);
                z-index: 9999;
                display: flex;
                align-items: center;
                justify-content: center;
                backdrop-filter: blur(4px);
            `;

            modal.innerHTML = `
                <div style="background:white; border-radius:16px; padding:32px; max-width:550px; width:90%; max-height:90vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,0.3);">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                        <h3 style="font-family:'Playfair Display',serif; font-size:1.3rem; margin:0;">
                            <i class="fas fa-reply" style="color:#c9a84c;"></i> Répondre à ${clientNom}
                        </h3>
                        <button onclick="fermerReponseModal()" style="background:transparent; border:none; font-size:1.5rem; cursor:pointer; color:#888;" onmouseover="this.style.color='#e74c3c'" onmouseout="this.style.color='#888'">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>

                    <div style="margin-bottom:16px;">
                        <label style="display:block; font-weight:600; font-size:0.9rem; margin-bottom:6px; color:var(--dark-gray);">Votre réponse</label>
                        <textarea id="reponseTextarea" rows="4" placeholder="Saisissez votre réponse..." style="width:100%; padding:12px 16px; border:2px solid #e8e8e8; border-radius:10px; font-size:0.95rem; resize:vertical; font-family:inherit; box-sizing:border-box;">${reponseExistante}</textarea>
                    </div>

                    <div style="display:flex; gap:12px;">
                        <button onclick="enregistrerReponse('${avisId}')" style="flex:1; padding:12px; background:linear-gradient(135deg, #c9a84c, #a8892e); color:white; border:none; border-radius:10px; font-weight:600; cursor:pointer; transition:all 0.3s;" onmouseover="this.style.transform='scale(1.02)'" onmouseout="this.style.transform='scale(1)'">
                            <i class="fas fa-save"></i> Enregistrer
                        </button>
                        <button onclick="fermerReponseModal()" style="flex:1; padding:12px; background:transparent; border:2px solid #e8e8e8; border-radius:10px; font-weight:600; cursor:pointer; transition:all 0.3s; color:#888;" onmouseover="this.style.borderColor='#e74c3c';this.style.color='#e74c3c'" onmouseout="this.style.borderColor='#e8e8e8';this.style.color='#888'">
                            <i class="fas fa-times"></i> Annuler
                        </button>
                    </div>
                </div>
            `;

            document.body.appendChild(modal);

            setTimeout(() => {
                const textarea = document.getElementById('reponseTextarea');
                if (textarea) textarea.focus();
            }, 100);
        }

        function fermerReponseModal() {
            const modal = document.getElementById('reponseModal');
            if (modal) modal.remove();
        }

        // ==========================================
        // ENREGISTRER LA RÉPONSE (CORRIGÉ AVEC LOGS)
        // ==========================================
        async function enregistrerReponse(avisId) {
            const textarea = document.getElementById('reponseTextarea');
            const reponse = textarea ? textarea.value.trim() : '';

            if (!reponse) {
                showNotification('❌ Veuillez saisir une réponse', 'error');
                return;
            }

            console.log('📝 Enregistrement de la réponse pour l\'avis:', avisId);
            console.log('📝 Contenu de la réponse:', reponse);

            try {
                const { data, error } = await supabaseClient
                    .from('avis')
                    .update({
                        reponse_admin: reponse,
                        reponse_date: new Date().toISOString(),
                        reponse_admin_nom: 'NIKEL'
                    })
                    .eq('id', avisId)
                    .select();

                if (error) {
                    console.error('❌ Erreur Supabase:', error);
                    showNotification('❌ Erreur: ' + (error.message || 'Erreur inconnue'), 'error');
                    return;
                }

                console.log('✅ Réponse enregistrée avec succès:', data);

                // Mettre à jour localement
                const avis = allAvis.find(a => a.id === avisId);
                if (avis) {
                    avis.reponse_admin = reponse;
                    avis.reponse_date = new Date().toISOString();
                    avis.reponse_admin_nom = 'NIKEL';
                }

                filteredAvis = [...allAvis];
                renderAvis();
                updateStats();

                fermerReponseModal();
                showNotification('✅ Réponse enregistrée avec succès', 'success');

            } catch (err) {
                console.error('❌ Erreur:', err);
                showNotification('❌ Erreur lors de l\'enregistrement', 'error');
            }
        }

        // ==========================================
        // NOTIFICATION
        // ==========================================
        function showNotification(message, type = 'info') {
            document.querySelectorAll('.toast-nikel').forEach(t => t.remove());

            const colors = {
                success: '#27ae60',
                error: '#e74c3c',
                info: '#c9a84c'
            };

            const toast = document.createElement('div');
            toast.className = 'toast-nikel';
            toast.style.cssText = `
                position: fixed;
                bottom: 30px;
                right: 30px;
                background: #1a1a1a;
                color: white;
                padding: 16px 24px;
                border-radius: 14px;
                font-weight: 500;
                box-shadow: 0 8px 40px rgba(0,0,0,0.25);
                z-index: 9999;
                max-width: 400px;
                font-size: 0.95rem;
                display: flex;
                align-items: center;
                gap: 12px;
                animation: slideUp 0.5s ease;
                border-left: 4px solid ${colors[type] || colors.info};
            `;
            toast.innerHTML = `<span>${message}</span>`;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(20px)';
                toast.style.transition = 'all 0.4s ease';
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        // ==========================================
        // EXPOSER LES FONCTIONS
        // ==========================================
        window.applyAvisFilters = applyAvisFilters;
        window.resetAvisFilters = resetAvisFilters;
        window.prevAvisPage = prevAvisPage;
        window.nextAvisPage = nextAvisPage;
        window.approuverAvis = approuverAvis;
        window.supprimerAvis = supprimerAvis;
        window.ouvrirReponseModal = ouvrirReponseModal;
        window.fermerReponseModal = fermerReponseModal;
        window.enregistrerReponse = enregistrerReponse;
        window.showNotification = showNotification;

        // ==========================================
        // INITIALISATION
        // ==========================================
        function init() {
            console.log('🚀 Chargement de avis.html...');
            loadAvisData();
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    })();
</script>
