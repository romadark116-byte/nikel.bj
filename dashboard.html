<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIKEL · Tableau de bord</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="animations.css">
    <link rel="stylesheet" href="responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .dashboard-page {
            padding: 40px 0;
            background: #fafafa;
            min-height: 100vh;
        }

        .dashboard-page .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #ffffff;
            padding: 24px 20px;
            border-radius: 16px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.06);
            text-align: center;
            border-left: 4px solid #c9a84c;
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
        }

        .stat-card .stat-label {
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .stat-card .stat-value {
            font-size: 2.2rem;
            font-weight: 700;
            color: #1a1a1a;
        }

        .stat-card .stat-value.gold { color: #c9a84c; }
        .stat-card .stat-value.orange { color: #f39c12; }
        .stat-card .stat-value.green { color: #27ae60; }
        .stat-card .stat-value.blue { color: #3498db; }

        .stat-card .stat-icon {
            font-size: 1.8rem;
            margin-bottom: 8px;
            display: block;
            opacity: 0.6;
        }

        .stat-card.border-gold { border-left-color: #c9a84c; }
        .stat-card.border-orange { border-left-color: #f39c12; }
        .stat-card.border-green { border-left-color: #27ae60; }
        .stat-card.border-blue { border-left-color: #3498db; }

        /* Section communes */
        .section-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.06);
            margin-bottom: 30px;
        }

        .section-card .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .section-card .section-header h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-card .section-header h3 i {
            color: #c9a84c;
        }

        .section-card .section-header a {
            color: #c9a84c;
            font-size: 0.9rem;
            text-decoration: none;
            transition: all 0.3s;
        }

        .section-card .section-header a:hover {
            color: #a8892e;
            text-decoration: underline;
        }

        /* Tableau */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid #f0f0f0;
        }

        .table-wrapper table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }

        .table-wrapper table thead {
            background: #f8f8f8;
            border-bottom: 2px solid #f0f0f0;
        }

        .table-wrapper table th {
            text-align: left;
            padding: 14px 12px;
            font-weight: 600;
            color: #1a1a1a;
        }

        .table-wrapper table td {
            padding: 12px;
            border-bottom: 1px solid #f0f0f0;
        }

        .table-wrapper table tr:hover td {
            background: #fafafa;
        }

        .table-wrapper table td .statut-badge {
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: white;
        }

        .statut-badge.solde { background: #27ae60; }
        .statut-badge.attente { background: #f39c12; }
        .statut-badge.annule { background: #e74c3c; }

        /* Produits recommandés - Version Admin simplifiée */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: #f8f8f8;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            border-color: #c9a84c;
        }

        .product-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .product-card .product-info {
            padding: 14px;
        }

        .product-card .product-info h4 {
            font-size: 0.95rem;
            font-weight: 600;
            margin: 0 0 4px 0;
        }

        .product-card .product-info .price {
            font-weight: 700;
            color: #c9a84c;
            font-size: 1rem;
            margin: 0 0 10px 0;
        }

        .product-card .product-info .product-stats {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 10px;
            padding-top: 8px;
            border-top: 1px solid #e8e8e8;
        }

        .product-card .product-info .product-stats span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .product-card .product-info .product-stats i {
            color: #c9a84c;
        }

        .product-card .product-info .btn-stats {
            width: 100%;
            padding: 10px;
            background: transparent;
            color: #1a1a1a;
            border: 2px solid #e8e8e8;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .product-card .product-info .btn-stats:hover {
            border-color: #c9a84c;
            background: #c9a84c;
            color: white;
        }

        .product-card .product-info .btn-stats i {
            font-size: 0.9rem;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #888;
        }

        .empty-state i {
            font-size: 2.5rem;
            color: #ddd;
            display: block;
            margin-bottom: 12px;
        }

        /* Responsive */
        @media (max-width: 992px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 576px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .products-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        /* Animation */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .stat-card {
            animation: slideUp 0.5s ease forwards;
        }
        .stat-card:nth-child(1) { animation-delay: 0.1s; }
        .stat-card:nth-child(2) { animation-delay: 0.2s; }
        .stat-card:nth-child(3) { animation-delay: 0.3s; }
        .stat-card:nth-child(4) { animation-delay: 0.4s; }

        /* Badge stock */
        .stock-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .stock-badge.in-stock {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .stock-badge.low-stock {
            background: #fff3e0;
            color: #e65100;
        }

        .stock-badge.out-of-stock {
            background: #ffebee;
            color: #c62828;
        }
    </style>
</head>
<body>
    <!-- ===== PAGE DASHBOARD SANS HEADER ===== -->
    <section class="dashboard-page">
        <div class="container">
            <!-- ===== TITRE ===== -->
            <div style="margin-bottom: 30px;">
                <h1 style="font-family:'Playfair Display',serif; font-size:2rem; color:#1a1a1a; margin-bottom:4px;">
                    <i class="fas fa-chart-pie" style="color:#c9a84c;"></i> Tableau de bord
                </h1>
                <p style="color:#888; font-size:0.95rem;">Vue d'ensemble de votre activité sur NIKEL.</p>
            </div>

            <!-- ===== STATISTIQUES ===== -->
            <div class="stats-grid">
                <div class="stat-card border-gold">
                    <span class="stat-icon">📦</span>
                    <p class="stat-label">Mes ventes</p>
                    <p class="stat-value gold" id="statVentes">0</p>
                </div>
                <div class="stat-card border-orange">
                    <span class="stat-icon">⏳</span>
                    <p class="stat-label">En attente</p>
                    <p class="stat-value orange" id="statAttente">0</p>
                </div>
                <div class="stat-card border-blue">
                    <span class="stat-icon">👁️</span>
                    <p class="stat-label">Mes visites</p>
                    <p class="stat-value blue" id="statVisites">0</p>
                </div>
                <div class="stat-card border-green">
                    <span class="stat-icon">💰</span>
                    <p class="stat-label">Total vendu</p>
                    <p class="stat-value green" id="statTotal">0 FCFA</p>
                </div>
            </div>

            <!-- ===== DERNIÈRES COMMANDES ===== -->
            <div class="section-card">
                <div class="section-header">
                    <h3><i class="fas fa-clock"></i> Dernières ventes</h3>
                    <a href="suivi-ventes.html">Voir toutes →</a>
                </div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Client</th>
                                <th>Date</th>
                                <th>Total</th>
                                <th>Statut</th>
                            </tr>
                        </thead>
                        <tbody id="lastVentesBody">
                            <tr>
                                <td colspan="5" style="text-align:center; padding:30px; color:#888;">
                                    <i class="fas fa-spinner fa-spin"></i> Chargement...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- ===== PRODUITS RECOMMANDÉS ===== -->
            <div class="section-card">
                <div class="section-header">
                    <h3><i class="fas fa-star"></i> Les articles les plus recommandés</h3>
                </div>
                <div class="products-grid" id="recommendedProducts">
                    <!-- Chargé par JavaScript -->
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        (function() {
            // ==========================================
            // SUPABASE CONFIG
            // ==========================================
            const SUPABASE_URL = "https://belekcdvgslnnejqonjb.supabase.co";
            const SUPABASE_ANON_KEY = "sb_publishable_tb_mhTjs26f4hMQD0Y4SSQ_8JnF2dqp";
            
            let supabaseClient = null;

            try {
                if (window.supabase) {
                    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                    window.supabaseClient = supabaseClient;
                    console.log('✅ Supabase initialisé dans dashboard.html');
                } else {
                    console.warn('⚠️ Supabase SDK non chargé');
                }
            } catch (e) {
                console.error('❌ Erreur initialisation Supabase:', e);
            }

            // ==========================================
            // DONNÉES DE TEST
            // ==========================================
            function getTestData() {
                return [
                    { id: 1, prenom: 'Jean', nom: 'Dupont', email: 'jean@email.com', telephone: '0612345678', ville: 'Paris', pays: 'FR', created_at: new Date().toISOString(), total_achat: 398.00, statut_produit: 'soldé' },
                    { id: 2, prenom: 'Fleury', nom: 'HAMIDOU', email: 'f91631072@gmail.com', telephone: '0191647720', ville: 'Parakou', pays: 'BJ', created_at: new Date(Date.now() - 86400000).toISOString(), total_achat: 267.00, statut_produit: 'en attente' },
                    { id: 3, prenom: 'Marie', nom: 'Martin', email: 'marie@email.com', telephone: '0765432109', ville: 'Lyon', pays: 'FR', created_at: new Date(Date.now() - 172800000).toISOString(), total_achat: 159.00, statut_produit: 'annulé' },
                    { id: 4, prenom: 'Amadou', nom: 'Diallo', email: 'amadou@email.com', telephone: '779012345', ville: 'Dakar', pays: 'SN', created_at: new Date(Date.now() - 259200000).toISOString(), total_achat: 299.00, statut_produit: 'soldé' },
                    { id: 5, prenom: 'Sophie', nom: 'Bernard', email: 'sophie@email.com', telephone: '0612345987', ville: 'Marseille', pays: 'FR', created_at: new Date(Date.now() - 345600000).toISOString(), total_achat: 149.00, statut_produit: 'en attente' }
                ];
            }

            // ==========================================
            // PRODUITS RECOMMANDÉS AVEC STATS RÉELLES
            // ==========================================
            // Ces stats seront mises à jour dynamiquement depuis les données
            let recommendedProducts = [
                {
                    id: 1,
                    nom: 'Montre EDGE',
                    prix: 149.00,
                    image: 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400&h=400&fit=crop',
                    ventes: 0,
                    stock: 12,
                    note: 4.8
                },
                {
                    id: 2,
                    nom: 'Veste BOMBER',
                    prix: 159.00,
                    image: 'https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=400&h=400&fit=crop',
                    ventes: 0,
                    stock: 8,
                    note: 4.6
                },
                {
                    id: 3,
                    nom: 'Lunettes NOIR',
                    prix: 120.00,
                    image: 'https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=400&h=400&fit=crop',
                    ventes: 0,
                    stock: 3,
                    note: 4.9
                },
                {
                    id: 4,
                    nom: 'Sac CUIR',
                    prix: 199.00,
                    image: 'https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=400&h=400&fit=crop',
                    ventes: 0,
                    stock: 15,
                    note: 4.5
                }
            ];

            // ==========================================
            // FORMATER LA DATE
            // ==========================================
            function formatDate(dateString) {
                if (!dateString) return '—';
                const d = new Date(dateString);
                if (isNaN(d.getTime())) return '—';
                return d.toLocaleDateString('fr-FR');
            }

            // ==========================================
            // BADGE STATUT
            // ==========================================
            function getStatutBadge(statut) {
                const s = {
                    'soldé': { cls: 'solde', icon: 'fa-check', text: 'Soldé' },
                    'en attente': { cls: 'attente', icon: 'fa-clock', text: 'En attente' },
                    'annulé': { cls: 'annule', icon: 'fa-times', text: 'Annulé' }
                };
                const st = s[statut] || s['en attente'];
                return `<span class="statut-badge ${st.cls}">
                    <i class="fas ${st.icon}"></i> ${st.text}
                </span>`;
            }

            // ==========================================
            // BADGE STOCK
            // ==========================================
            function getStockBadge(stock) {
                if (stock > 10) {
                    return `<span class="stock-badge in-stock"><i class="fas fa-check-circle"></i> En stock</span>`;
                } else if (stock > 0) {
                    return `<span class="stock-badge low-stock"><i class="fas fa-exclamation-triangle"></i> Stock faible</span>`;
                } else {
                    return `<span class="stock-badge out-of-stock"><i class="fas fa-times-circle"></i> Rupture</span>`;
                }
            }

            // ==========================================
            // METTRE À JOUR LES STATISTIQUES
            // ==========================================
            function updateStats(data) {
                const ventes = data.filter(v => v.statut_produit === 'soldé');
                const totalVentes = ventes.length;
                const attente = data.filter(v => v.statut_produit === 'en attente');
                const totalAttente = attente.length;
                const totalVendu = ventes.reduce((sum, v) => sum + (v.total_achat || 0), 0);
                const totalVisites = data.length;

                document.getElementById('statVentes').textContent = totalVentes;
                document.getElementById('statAttente').textContent = totalAttente;
                document.getElementById('statVisites').textContent = totalVisites;
                document.getElementById('statTotal').textContent = totalVendu.toFixed(2).replace('.', ',') + ' FCFA';

                window._dashboardStats = { totalVentes, totalAttente, totalVisites, totalVendu };
            }

            // ==========================================
            // CALCULER LES VENTES PAR PRODUIT
            // ==========================================
            function calculateProductSales(data) {
                // Compter les ventes par produit (à partir des données clients)
                // Ici on simule car la table clients ne contient pas de référence produit
                // Dans un vrai système, vous auriez une table commandes avec produit_id
                
                // Pour l'exemple, on attribue des ventes aléatoires aux produits
                // Mais dans la réalité, vous feriez un GROUP BY produit_id
                const productSales = {};
                
                // Simulation : répartir les ventes entre les produits
                const soldOrders = data.filter(v => v.statut_produit === 'soldé');
                const totalSold = soldOrders.length;
                
                // Distribuer les ventes entre les produits recommandés
                recommendedProducts.forEach((p, index) => {
                    // Répartition inégale pour simuler des produits plus/moins vendus
                    const ratio = (index + 1) / recommendedProducts.reduce((sum, _, i) => sum + i + 1, 0);
                    productSales[p.id] = Math.round(totalSold * ratio);
                });
                
                return productSales;
            }

            // ==========================================
            // AFFICHER LES DERNIÈRES VENTES
            // ==========================================
            function renderLastVentes(data) {
                const tbody = document.getElementById('lastVentesBody');
                const sorted = [...data].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                const last5 = sorted.slice(0, 5);

                if (last5.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="5" style="text-align:center; padding:30px; color:#888;">
                                <i class="fas fa-inbox" style="font-size:1.5rem; display:block; margin-bottom:8px; color:#ddd;"></i>
                                Aucune commande pour le moment
                            </td>
                        </tr>
                    `;
                    return;
                }

                tbody.innerHTML = last5.map(v => `
                    <tr>
                        <td style="font-weight:600;">#${v.id}</td>
                        <td>${v.prenom || ''} ${v.nom || ''}</td>
                        <td style="color:#888;">${formatDate(v.created_at)}</td>
                        <td style="font-weight:700; color:#c9a84c;">${(v.total_achat || 0).toFixed(2).replace('.', ',')} FCFA</td>
                        <td>${getStatutBadge(v.statut_produit || 'en attente')}</td>
                    </tr>
                `).join('');
            }

            // ==========================================
            // AFFICHER LES PRODUITS RECOMMANDÉS AVEC STATS RÉELLES
            // ==========================================
            function renderRecommendedProducts(salesData) {
                const container = document.getElementById('recommendedProducts');
                
                container.innerHTML = recommendedProducts.map(p => {
                    // Récupérer le nombre de ventes réel pour ce produit
                    const ventesReelles = salesData && salesData[p.id] !== undefined ? salesData[p.id] : p.ventes;
                    
                    return `
                    <div class="product-card">
                        <img src="${p.image}" alt="${p.nom}" loading="lazy">
                        <div class="product-info">
                            <h4>${p.nom}</h4>
                            <p class="price">${p.prix.toFixed(2).replace('.', ',')} FCFA</p>
                            
                            <div class="product-stats">
                                <span><i class="fas fa-shopping-bag"></i> ${ventesReelles} vendus</span>
                                <span><i class="fas fa-star" style="color:#f39c12;"></i> ${p.note}/5</span>
                                <span>${getStockBadge(p.stock)}</span>
                            </div>

                            <button class="btn-stats" onclick="goToSuiviVentes()">
                                <i class="fas fa-chart-bar"></i> Voir les statistiques
                            </button>
                        </div>
                    </div>
                `}).join('');
            }

            // ==========================================
            // REDIRIGER VERS SUIVI-VENTES
            // ==========================================
            function goToSuiviVentes() {
                window.location.href = 'suivi-ventes.html';
            }

            // ==========================================
            // CHARGER LES DONNÉES
            // ==========================================
            async function loadDashboardData() {
                try {
                    console.log('📝 Chargement des données du dashboard...');

                    if (!supabaseClient) {
                        console.warn('⚠️ Supabase non disponible, utilisation des données de test');
                        const testData = getTestData();
                        updateStats(testData);
                        renderLastVentes(testData);
                        const salesData = calculateProductSales(testData);
                        renderRecommendedProducts(salesData);
                        return;
                    }

                    const { data, error } = await supabaseClient
                        .from('clients')
                        .select('*')
                        .order('created_at', { ascending: false });

                    if (error) {
                        console.error('❌ Erreur chargement:', error);
                        const testData = getTestData();
                        updateStats(testData);
                        renderLastVentes(testData);
                        const salesData = calculateProductSales(testData);
                        renderRecommendedProducts(salesData);
                        return;
                    }

                    if (data && data.length > 0) {
                        console.log(`✅ ${data.length} clients chargés depuis Supabase`);
                        updateStats(data);
                        renderLastVentes(data);
                        const salesData = calculateProductSales(data);
                        renderRecommendedProducts(salesData);
                    } else {
                        console.warn('⚠️ Aucune donnée trouvée, utilisation des données de test');
                        const testData = getTestData();
                        updateStats(testData);
                        renderLastVentes(testData);
                        const salesData = calculateProductSales(testData);
                        renderRecommendedProducts(salesData);
                    }

                } catch (err) {
                    console.error('❌ Erreur:', err);
                    const testData = getTestData();
                    updateStats(testData);
                    renderLastVentes(testData);
                    const salesData = calculateProductSales(testData);
                    renderRecommendedProducts(salesData);
                }
            }

            // ==========================================
            // EXPOSER LES FONCTIONS GLOBALEMENT
            // ==========================================
            window.goToSuiviVentes = goToSuiviVentes;

            // ==========================================
            // INITIALISATION
            // ==========================================
            function init() {
                console.log('🚀 Chargement du dashboard...');
                loadDashboardData();
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
